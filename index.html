    <!-- 좀비 Service Worker 자동 해제 — 과거에 등록된 sw.js 가 캐시 덮는 문제 방지 -->
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(regs => {
                if (regs.length > 0) {
                    console.log(`🧹 기존 Service Worker ${regs.length}개 해제 중...`);
                    Promise.all(regs.map(r => r.unregister())).then(() => {
                        // 캐시 API 도 같이 비움
                        if ('caches' in window) {
                            caches.keys().then(names => Promise.all(names.map(n => caches.delete(n))))
                                .then(() => {
                                    console.log('✅ SW·캐시 해제 완료, 페이지 리로드');
                                    location.reload();
                                });
                        } else {
                            location.reload();
                        }
                    });
                }
            }).catch(() => {});
        }
    </script>

    <!-- Supabase 설정 (라이브러리 로드 완료 후 실행) -->
    <script>
        // Supabase 라이브러리 완전 로드 대기
        function waitForSupabaseComplete() {
            return new Promise((resolve, reject) => {
                let attempts = 0;
                const maxAttempts = 100; // 10초 대기
                
                const checkSupabase = () => {
                    attempts++;
                    console.log(`🔄 Supabase 라이브러리 완전 로드 확인 ${attempts}/${maxAttempts}`);
                    
                    // 더 엄격한 검사: supabase 객체가 존재하고 createClient 함수가 있는지 확인
                    if (typeof supabase !== 'undefined' && 
                        supabase !== null && 
                        typeof supabase.createClient === 'function') {
                        console.log('✅ Supabase 라이브러리 완전 로드 확인됨');
                        console.log('🔍 Supabase 객체 상태:', {
                            'typeof supabase': typeof supabase,
                            'supabase': supabase,
                            'createClient': typeof supabase.createClient
                        });
                        resolve();
                    } else if (attempts >= maxAttempts) {
                        console.error('❌ Supabase 라이브러리 로드 실패 - 최대 재시도 횟수 초과');
                        console.error('🔍 최종 상태:', {
                            'typeof supabase': typeof supabase,
                            'supabase': supabase,
                            'createClient': supabase ? typeof supabase.createClient : 'N/A'
                        });
                        reject(new Error('Supabase 라이브러리 로드 실패'));
                    } else {
                        setTimeout(checkSupabase, 100);
                    }
                };
                
                checkSupabase();
            });
        }
        
        // Supabase 라이브러리 완전 로드 후 설정 실행
        waitForSupabaseComplete()
            .then(() => {
                console.log('✅ Supabase 라이브러리 준비 완료, 설정 로드 시작');
                
                // 설정 스크립트 동적 로드
                const _ver = window.APP_VERSION || '';
                const _qs  = _ver ? `?v=${_ver}` : '';
                const configScript = document.createElement('script');
                configScript.src = `js/supabase-config.js${_qs}`;
                configScript.onload = function() {
                    console.log('✅ Supabase 설정 로드 완료');

                    // Supabase 전용 모드 스크립트 로드
                    const onlyModeScript = document.createElement('script');
                    onlyModeScript.src = `js/supabase-only-mode.js${_qs}`;
                    onlyModeScript.onload = function() {
                        console.log('✅ Supabase 전용 모드 로드 완료');
                        
                        // Supabase 초기화 완료 후 나머지 스크립트들 동적 로드
                        loadRemainingScripts();
                    };
                    onlyModeScript.onerror = function() {
                        console.error('❌ Supabase 전용 모드 스크립트 로드 실패');
                    };
                    document.head.appendChild(onlyModeScript);
                };
                configScript.onerror = function() {
                    console.error('❌ Supabase 설정 스크립트 로드 실패');
                };
                document.head.appendChild(configScript);
            })
            .catch(error => {
                console.error('❌ Supabase 초기화 실패:', error);
                // 페이지 새로고침으로 재시도
                setTimeout(() => {
                    console.log('🔄 페이지 새로고침으로 재시도...');
                    location.reload();
                }, 3000);
            });
    </script>
    
    <!-- 나머지 스크립트 동적 로드 함수 -->
    <script>
        function loadRemainingScripts() {
            console.log('🔄 Supabase 초기화 완료, 나머지 스크립트들 로드 시작');
            
            // 로드할 스크립트 목록 (순서대로) - 데이터 매니저를 먼저 로드
            const scriptsToLoad = [
                // 기존 앱 스크립트들
                { src: 'js/database.js', type: 'text/javascript' },
                { src: 'js/app.js', type: 'text/javascript' },
                { src: 'js/customer-management.js', type: 'text/javascript' },
                
                // 데이터 매니저 스크립트들 (컴포넌트보다 먼저 로드)
                { src: 'features/customers/customerData.js', type: 'module' },
                { src: 'features/customers/customerUI.js', type: 'module' },
                { src: 'features/orders/orderData.js', type: 'module' },
                { src: 'features/products/productData.js', type: 'module' },
                { src: 'features/products/productUI.js', type: 'module' },
                { src: 'features/waitlist/waitlistData.js', type: 'module' },
                
                // 카테고리 관련 스크립트들 (상품관리보다 먼저 로드)
                { src: 'features/categories/categoryData.js', type: 'module' },
                { src: 'features/categories/categoryUI.js', type: 'module' },
                
                // 메인 스크립트 (조건부 로드)
                { src: 'main.js', type: 'module', conditional: true },
                
                // 컴포넌트 스크립트들 (데이터 매니저 로드 후)
                { src: 'components/header/header.js', type: 'text/javascript' },
                { src: 'components/navigation/navigation.js', type: 'text/javascript' },
                { src: 'components/dashboard/dashboard.js', type: 'text/javascript' },
                { src: 'js/order-management.js', type: 'text/javascript' },
                { src: 'features/orders/orderPrint.js', type: 'text/javascript' },
                { src: 'components/product-management/product-management.js', type: 'text/javascript' },
                { src: 'components/waitlist-management/waitlist-management.js', type: 'text/javascript' }
            ];
            
            // 스크립트들을 순차적으로 로드
            loadScriptsSequentially(scriptsToLoad, 0);
        }
        
        function loadScriptsSequentially(scripts, index) {
            if (index >= scripts.length) {
                console.log('✅ 모든 스크립트 로드 완료');
                initializeNavigationAfterScriptsLoaded();
                return;
            }

            // 무한 루프 방지를 위한 최대 재시도 횟수
            if (index > scripts.length * 2) {
                console.error('❌ 스크립트 로드 무한 루프 감지. 강제 종료.');
                initializeNavigationAfterScriptsLoaded();
                return;
            }

            const scriptInfo = scripts[index];
            console.log(`📦 스크립트 로드 중 (${index + 1}/${scripts.length}): ${scriptInfo.src}`);

            const script  = document.createElement('script');
            const _v      = window.APP_VERSION || '';
            const _sep    = scriptInfo.src.includes('?') ? '&' : '?';
            script.src    = _v ? `${scriptInfo.src}${_sep}v=${_v}` : scriptInfo.src;
            script.type   = scriptInfo.type;

            // 타임아웃 설정 (10초)
            const timeoutId = setTimeout(() => {
                console.warn(`⏰ 스크립트 로드 타임아웃: ${scriptInfo.src}`);
                loadScriptsSequentially(scripts, index + 1);
            }, 10000);

            script.onload = function() {
                clearTimeout(timeoutId);
                loadScriptsSequentially(scripts, index + 1);
            };

            script.onerror = function() {
                clearTimeout(timeoutId);
                if (scriptInfo.conditional) {
                    console.warn(`⚠️ 조건부 스크립트 로드 실패 (무시): ${scriptInfo.src}`);
                } else {
                    console.error(`❌ 스크립트 로드 실패: ${scriptInfo.src}`);
                }
                loadScriptsSequentially(scripts, index + 1);
            };
            
            document.head.appendChild(script);
        }
        
        // 모든 스크립트 로드 완료 후 네비게이션 초기화 함수
        function initializeNavigationAfterScriptsLoaded() {
            console.log('🔄 네비게이션 초기화 시작...');
            
            const navContainer = document.getElementById('navigation-container');
            if (!navContainer) {
                console.warn('⚠️ 네비게이션 컨테이너를 찾을 수 없습니다.');
                console.log('🔍 사용 가능한 요소들:', document.querySelectorAll('[id*="nav"]'));
                // 폴백으로 기본 네비게이션 설정
                setupNavigation();
                return;
            }
            
            console.log('✅ 네비게이션 컨테이너 발견:', navContainer);
            
            // Header 컴포넌트 초기화 (버전 배지 포함)
            if (window.HeaderComponent) {
                const headerComponent = new window.HeaderComponent();
                headerComponent.init(document.getElementById('header-container'));
                console.log('✅ Header 컴포넌트 초기화 완료');
            }

            // Navigation 컴포넌트 초기화
            if (window.NavigationComponent) {
                const navigationComponent = new window.NavigationComponent();
                navigationComponent.init(navContainer);
                console.log('✅ Navigation 컴포넌트 초기화 완료');
            } else {
                console.warn('⚠️ NavigationComponent를 찾을 수 없습니다.');
                // 폴백: 기존 네비게이션 이벤트 리스너 설정
                setupNavigation();
            }
        }
    </script>

    <!-- 메인 앱 초기화 -->
    <script>
        // 앱 초기화
        document.addEventListener('DOMContentLoaded', async () => {
            console.log('🚀 앱 초기화 시작...');
            
            try {
                // Header 컴포넌트 로드
                const headerContainer = document.getElementById('header-container');
                if (headerContainer) {
                    const headerResponse = await fetch('components/header/header.html', { cache: 'no-store' });
                    if (headerResponse.ok) {
                        headerContainer.innerHTML = await headerResponse.text();
                        console.log('✅ Header 컴포넌트 로드 완료');
                        // 헤더 HTML 삽입 직후 버전 배지 즉시 적용
                        const _vEl = document.getElementById('app-version-number');
                        if (_vEl && window.APP_VERSION) _vEl.textContent = window.APP_VERSION;
                    }
                }
                
                // 네비는 헤더에 통합됨 — 별도 네비 HTML 로드 생략 (버튼은 header에 있음)
                const navContainer = document.getElementById('navigation-container');
                if (navContainer) {
                    navContainer.innerHTML = '';
                }
                
                // Dashboard 컴포넌트 로드 (기본 활성화)
                const dashboardContainer = document.getElementById('dashboard-section');
                if (dashboardContainer) {
                    try {
                        // HTML만 로드 (JavaScript는 스크립트 로딩 시스템에서 이미 로드됨)
                        const dashboardResponse = await fetch('components/dashboard/dashboard.html');
                        if (dashboardResponse.ok) {
                            dashboardContainer.innerHTML = await dashboardResponse.text();
                            console.log('✅ Dashboard HTML 로드 완료');
                            
                            // DashboardComponent가 로드될 때까지 대기 후 초기화
                            const initDashboard = () => {
                                if (window.DashboardComponent) {
                                    console.log('🏗️ Dashboard 컴포넌트 초기화 시작...');
                                    const dashboardComponent = new window.DashboardComponent();
                                    dashboardComponent.init(dashboardContainer);
                                    window.dashboardComponent = dashboardComponent;
                                    console.log('✅ Dashboard 컴포넌트 초기화 완료');
                                } else {
                                    console.log('⏳ DashboardComponent 로드 대기 중...');
                                    setTimeout(initDashboard, 200);
                                }
                            };
                            
                            // 약간의 지연 후 초기화 시작
                            setTimeout(initDashboard, 100);
                        }
                    } catch (error) {
                        console.error('❌ Dashboard 컴포넌트 초기 로드 실패:', error);
                    }
                }
                
                // 다른 컴포넌트들은 탭 전환 시 동적으로 로드됩니다
                console.log('📋 다른 컴포넌트들은 탭 전환 시 동적으로 로드됩니다');
                
                
                // 기존 앱 초기화
                if (window.orderSystem) {
                    window.orderSystem.init();
                }
                
                // 페이지 상태 복원
                restorePageState();
                
                console.log('✅ 앱 초기화 완료');
                
            } catch (error) {
                console.error('❌ 앱 초기화 실패:', error);
                console.error('❌ 오류 상세:', error.stack);
            }
        });

        // 네비게이션 설정
        function setupNavigation() {
            const navButtons = document.querySelectorAll('.nav-btn');
            navButtons.forEach(button => {
                button.addEventListener('click', function() {
                    const tabId = this.id.replace('nav-', '');
                    switchTab(tabId);
                });
            });
        }

        // 탭 전환 함수
        async function switchTab(tabId) {
            console.log('🔄 탭 전환:', tabId);

            // 고객 상세 플로팅 패널 숨기기 (고객관리 외 탭 전환 시)
            if (tabId !== 'customers') {

        // DOM이 완전히 로드될 때까지 대기하는 함수
        async function waitForDOMReady() {
            return new Promise((resolve) => {
                const checkReady = () => {
                    // DOM이 완전히 로드되었는지 확인
                    if (document.readyState === 'complete') {
                        console.log('✅ DOM 로딩 완료');
                        resolve();
                    } else {
                        console.log('⏳ DOM 로딩 중...', document.readyState);
                        setTimeout(checkReady, 10);
                    }
                };
                
                checkReady();
            });
        }

                await new Promise((resolve, reject) => {
                    const script = document.createElement('script');
                    script.src = 'components/settings/settings.js';
                    script.onload = () => {
                        console.log('✅ 환경설정 JavaScript 로드 완료');
                        // 환경설정 초기화
                        if (window.SettingsComponent) {
                            const settingsComponent = new window.SettingsComponent();
                            settingsComponent.init(settingsContainer);
                        }
                        resolve();
                    };
                    script.onerror = () => {
                        console.error('❌ 환경설정 JavaScript 로드 실패');
                        resolve(); // 실패해도 진행
                    };
                    document.head.appendChild(script);
                });

                console.log('✅ 환경설정 컴포넌트 로드 완료');
                return true;
                
            } catch (error) {
                console.error('❌ 환경설정 컴포넌트 로드 실패:', error);
                return false;
            }
        }

        // 전역 함수로 등록
        window.switchTab = switchTab;
        window.savePageState = savePageState;
        window.loadSettingsComponent = loadSettingsComponent;

    </script>
