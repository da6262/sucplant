<!-- 상품 관리 컴포넌트 -->
<div id="products-section" class="flex flex-col h-[calc(100vh-3.5rem)] min-h-0 bg-white">

    <!-- 헤더 -->
    <div class="page-header">
        <h2>상품 관리</h2>
        <div class="action-group">
            <button id="export-products-btn"   class="btn-secondary"><i class="fas fa-download"></i>내보내기</button>
            <button id="import-products-btn"   class="btn-secondary"><i class="fas fa-upload"></i>일괄 등록</button>
            <button id="manage-categories-btn" class="btn-secondary"><i class="fas fa-tags"></i>카테고리</button>
            <button id="print-barcodes-btn"    class="btn-secondary"><i class="fas fa-barcode"></i>바코드 인쇄</button>
            <button id="scan-barcode-btn"      class="btn-secondary"><i class="fas fa-camera"></i>카메라 스캔</button>
            <button id="add-product-btn" class="btn-primary"><i class="fas fa-plus"></i>상품 등록</button>
        </div>
    </div>

    <!-- 검색 및 필터 -->
    <div class="filter-bar">
        <div class="relative">
            <input type="text" id="product-search" placeholder="상품명 검색..."
                   class="input-ui" style="max-width:240px;padding-right:28px;" autocomplete="off">
            <i class="fas fa-search absolute right-2 top-1/2 -translate-y-1/2 text-muted text-xs pointer-events-none"></i>
        </div>
        <select id="product-category-filter" class="input-ui" style="max-width:150px;">
            <option value="">전체 카테고리</option>
            <!-- DB에서 동적으로 채워집니다 -->
        </select>
        <select id="product-stock-filter" class="input-ui" style="max-width:120px;">
            <option value="">재고 전체</option>
            <option value="in-stock">재고 있음</option>
            <option value="low-stock">재고 부족</option>
            <option value="out-of-stock">품절</option>
        </select>
        <select id="product-price-filter" class="input-ui" style="max-width:120px;">
            <option value="">가격 전체</option>
            <option value="0-10000">1만원 이하</option>
            <option value="10000-30000">1-3만원</option>
            <option value="30000-50000">3-5만원</option>
            <option value="50000+">5만원 이상</option>
        </select>
        <button id="product-filter-btn" class="btn-search">
            <i class="fas fa-search"></i>검색
        </button>
    </div>

    <!-- 상품 목록 테이블 -->
    <div class="flex-1 overflow-auto">
        <table class="table-ui w-full table-fixed">
            <thead class="sticky top-0 z-10">
                <!-- <tr> 는 JS 의 PRODUCT_COLUMNS 스키마에서 자동 생성 (헤더·행 단일 소스) -->
                <tr id="products-table-header"></tr>
            </thead>
            <tbody id="products-table-body">
                <!-- JS로 채워짐 -->
            </tbody>
        </table>
    </div>

    <!-- 하단 상태 바 -->
    <footer id="product-status-footer" class="shrink-0 px-3 py-1 border-t border-gray-200 bg-section text-xs text-body flex items-center justify-between">
        <span>총 <strong id="product-status-total">0</strong>개 · <span id="product-list-count">0개 표시</span></span>
        <div class="flex items-center gap-2">
            <span id="products-pagination-info" class="text-muted"></span>
            <div class="flex items-center gap-1">
                <button id="products-pagination-prev" class="btn-secondary" style="padding:3px 8px;">
                    <i class="fas fa-chevron-left text-xs"></i>
                </button>
                <div id="products-pagination-numbers" class="flex gap-1"></div>
                <button id="products-pagination-next" class="btn-secondary" style="padding:3px 8px;">
                    <i class="fas fa-chevron-right text-xs"></i>
                </button>
                <button id="prev-products-page-btn" class="hidden"></button>
                <button id="next-products-page-btn" class="hidden"></button>
            </div>
            <span class="text-gray-300">|</span>
            <label class="flex items-center gap-1 text-muted">표시
                <select id="product-page-size" class="select-page-size">
                    <option value="10">10개</option>
                    <option value="20" selected>20개</option>
                    <option value="50">50개</option>
                    <option value="0">전체</option>
                </select>
            </label>
        </div>
    </footer>

    <!-- 상품 일괄 등록 모달 -->
    <div id="product-import-modal" class="modal-overlay hidden">
        <div class="modal-container" style="max-width:800px;">
            <div class="modal-header">
                <span class="modal-title"><i class="fas fa-upload mr-2"></i>상품 일괄 등록</span>
                <button onclick="window._closeProductImport?.()" class="modal-close-btn"><i class="fas fa-times"></i></button>
            </div>

            <div class="modal-body" style="padding:12px 16px;">
                <!-- 탭 전환 -->
                <div class="flex gap-2 mb-3">
                    <button onclick="window._switchImportTab?.('table')" class="import-tab-btn btn-primary flex-1" data-tab="table" style="justify-content:center;">
                        <i class="fas fa-table mr-1"></i>직접 입력
                    </button>
                    <button onclick="window._switchImportTab?.('manual')" class="import-tab-btn btn-secondary flex-1" data-tab="manual" style="justify-content:center;">
                        <i class="fas fa-keyboard mr-1"></i>붙여넣기
                    </button>
                    <button onclick="window._switchImportTab?.('file')" class="import-tab-btn btn-secondary flex-1" data-tab="file" style="justify-content:center;">
                        <i class="fas fa-file-excel mr-1"></i>엑셀 파일
                    </button>
                </div>

                <!-- 직접 입력 탭 (표 양식) -->
                <div id="import-tab-table">
                    <div class="flex items-center justify-between mb-2">
                        <p class="text-xs text-muted">표에 직접 입력하세요. 상품명은 필수입니다.</p>
                        <button onclick="window._addBulkRow?.()" class="btn-primary btn-xs"><i class="fas fa-plus mr-1"></i>행 추가</button>
                    </div>
                    <div class="border border-gray-200 rounded-lg overflow-x-auto" style="max-height:350px;overflow-y:auto;">
                        <table class="w-full table-ui">
                            <thead>
                                <tr>
                                    <th class="w-8 text-center">#</th>
                                    <th class="min-w-[150px]">상품명 <span class="text-danger">*</span></th>
                                    <th class="w-24">카테고리</th>
                                    <th class="w-20">판매가</th>
                                    <th class="w-20">매입가</th>
                                    <th class="w-16">재고</th>
                                    <th class="w-16">사이즈</th>
                                    <th class="w-10"></th>
                                </tr>
                            </thead>
                            <tbody id="bulk-input-tbody">
                            </tbody>
                        </table>
                    </div>
                </div>


                <!-- 붙여넣기 탭 -->
                <div id="import-tab-manual">
                    <p class="text-xs text-muted mb-2">엑셀에서 복사한 내용을 아래에 붙여넣기 하세요 (탭/쉼표 구분 자동 감지)</p>
                    <textarea id="product-paste-textarea" rows="8" class="form-control" style="font-size:12px;font-family:monospace;"
                        placeholder="상품명	카테고리	판매가	재고	사이즈
에케베리아 치와와	에케베리아	15000	10	M
크라슐라 화제	크라슐라	8000	20	S
코노피튬 부르겐세리	코노피튬	5000	30	SX

※ 엑셀에서 Ctrl+C → 여기에 Ctrl+V
※ 상품명만 필수, 나머지 비워도 됩니다"></textarea>
                    <!-- 붙여넣기 미리보기 -->
                    <div id="paste-preview-section" class="hidden mt-3">
                        <div class="flex items-center justify-between mb-1">
                            <span class="text-xs font-medium text-body">미리보기</span>
                            <span id="paste-preview-count" class="text-xs text-brand font-semibold"></span>
                        </div>
                        <div class="border border-gray-200 rounded-lg overflow-x-auto" style="max-height:200px;overflow-y:auto;">
                            <table class="w-full table-ui">
                                <thead><tr id="paste-preview-thead"></tr></thead>
                                <tbody id="paste-preview-tbody"></tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <!-- 파일 업로드 탭 -->
                <div id="import-tab-file" class="hidden">
                    <div id="product-drop-zone" class="border-2 border-dashed border-gray-300 rounded-lg p-6 text-center cursor-pointer hover:border-green-400 transition-colors">
                        <div id="product-upload-area-content">
                            <i class="fas fa-file-excel text-brand text-3xl mb-2"></i>
                            <p class="text-sm text-body mb-2">클릭하거나 파일을 드래그하세요</p>
                            <p class="text-xs text-muted">.xlsx, .xls, .csv</p>
                        </div>
                        <div id="product-upload-file-info" class="hidden">
                            <i class="fas fa-file-check text-brand text-2xl mb-1"></i>
                            <p class="text-sm font-medium text-body"><span id="product-upload-file-name"></span></p>
                            <p class="text-xs text-muted"><span id="product-upload-file-size"></span></p>
                            <button id="product-remove-file-btn" class="btn-secondary mt-2" style="font-size:11px;padding:2px 8px;">파일 제거</button>
                        </div>
                        <input type="file" id="product-excel-input" accept=".xlsx,.xls,.csv" class="hidden">
                    </div>
                    <div class="flex gap-2 mt-2">
                        <button id="download-product-template-btn" class="btn-secondary" style="font-size:11px;">
                            <i class="fas fa-download mr-1"></i>양식 다운로드 (.xlsx)
                        </button>
                    </div>
                    <!-- 파일 미리보기 -->
                    <div id="product-import-preview" class="hidden mt-3">
                        <div class="flex items-center justify-between mb-1">
                            <span class="text-xs font-medium text-body">미리보기</span>
                            <span id="product-preview-count" class="text-xs text-brand font-semibold"></span>
                        </div>
                        <div class="border border-gray-200 rounded-lg overflow-x-auto" style="max-height:200px;overflow-y:auto;">
                            <div id="product-preview-content"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="modal-footer">
                <span id="import-row-count" class="text-sm text-muted">0개</span>
                <div class="flex gap-2">
                    <button onclick="window._closeProductImport?.()" class="btn-secondary">취소</button>
                    <button id="product-import-start" class="btn-primary" disabled><i class="fas fa-upload mr-1"></i>등록 시작</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 상품 등록/수정 모달 -->
    <div id="product-modal" class="modal-overlay hidden">
        <div id="product-modal-content" class="modal-container modal-md">
            <div class="modal-header">
                <span id="product-modal-title" class="modal-title">새 상품 등록</span>
                <button id="close-product-modal" onclick="window.closeProductModal()" class="modal-close-btn" title="닫기">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body" style="padding:12px 16px;">
                <form id="product-form" class="form-grid" style="gap:8px 12px;">
                    <input type="hidden" id="product-form-id">
                    <input type="hidden" id="product-form-created-at">

                    <!-- 상품명 (전체) -->
                    <div class="form-col-12">
                        <label class="form-label">상품명 <span class="req">*</span></label>
                        <div style="position:relative;">
                            <input type="text" id="product-form-name" placeholder="예: White Platter (대)" required class="form-control" autocomplete="off">
                            <div id="product-name-suggestions" class="absolute z-50 w-full bg-white border border-gray-200 rounded-lg shadow-lg hidden max-h-48 overflow-y-auto" style="top:100%;left:0;"></div>
                        </div>
                        <div id="product-code-display" class="form-helper hidden">
                            <i class="fas fa-barcode mr-1"></i>코드: <span id="product-code-value">자동 생성</span>
                        </div>
                        <div id="product-name-duplicate-warning" class="form-error hidden">
                            <i class="fas fa-exclamation-triangle mr-1"></i>이미 등록된 상품명입니다
                        </div>
                    </div>

                    <!-- 카테고리 | 사이즈 -->
                    <div class="form-col-6">
                        <label class="form-label">카테고리 <span class="req">*</span></label>
                        <div style="position:relative;">
                            <select id="product-form-category" required class="form-control" style="padding-right:32px;">
                                <option value="">카테고리 선택</option>
                                <option value="__ADD_NEW__" class="text-info font-medium">+ 새 카테고리 추가</option>
                            </select>
                            <button type="button" id="modal-quick-add-category-btn"
                                    style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--info);"
                                    title="새 카테고리 빠른 추가">
                                <i class="fas fa-plus-circle text-sm"></i>
                            </button>
                        </div>
                    </div>
                    <div class="form-col-6">
                        <label class="form-label">사이즈</label>
                        <select id="product-form-size-select" class="form-control" onchange="handleSizeChange()">
                            <option value="">선택</option>
                            <option value="SX">SX</option>
                            <option value="S">S</option>
                            <option value="M">M</option>
                            <option value="L">L</option>
                            <option value="XL">XL</option>
                            <option value="custom">직접 기입</option>
                        </select>
                        <input type="text" id="product-form-size-custom" placeholder="예: 3-5cm" class="form-control hidden" style="margin-top:4px;">
                    </div>

                    <!-- 판매가 | 재고 -->
                    <div class="form-col-6">
                        <label class="form-label">판매가 <span class="req">*</span></label>
                        <div class="form-input-group with-unit">
                            <input type="number" id="product-form-price" placeholder="0" min="0" step="1000" required class="form-control" oninput="calculateModalProfitMargin()">
                            <span class="form-input-unit">원</span>
                        </div>
                    </div>
                    <div class="form-col-6">
                        <label class="form-label">재고수량 <span class="req">*</span></label>
                        <div class="form-input-group with-unit">
                            <input type="number" id="product-form-stock" placeholder="0" min="0" required class="form-control">
                            <span class="form-input-unit">개</span>
                        </div>
                    </div>

                    <!-- 사진 -->
                    <div class="form-col-12">
                        <label class="form-label">상품 이미지</label>
                        <div class="flex items-center gap-3">
                            <label class="btn-secondary cursor-pointer" style="padding:5px 12px;font-size:12px;">
                                <i class="fas fa-camera mr-1"></i>사진 선택
                                <input type="file" id="product-form-image-file" accept="image/*" class="hidden"
                                       onchange="window.handleProductImageSelect(this)">
                            </label>
                            <span id="product-image-filename" class="text-xs text-muted truncate" style="max-width:180px;"></span>
                            <input type="hidden" id="product-form-image" value="">
                            <div id="product-image-preview" class="hidden">
                                <img id="product-image-preview-img" class="w-14 h-14 object-cover rounded border border-gray-200" alt="미리보기">
                            </div>
                        </div>
                    </div>

                    <!-- 접기: 추가 정보 (매입가·배송·설명) -->
                    <div class="form-col-12">
                        <details class="border border-gray-200 rounded-lg">
                            <summary class="px-3 py-2 text-xs text-muted cursor-pointer hover:text-body select-none">
                                <i class="fas fa-chevron-right mr-1 text-2xs"></i>추가 정보 (매입가 · 배송 · 설명)
                            </summary>
                            <div class="px-3 pb-3 pt-1 grid grid-cols-2 gap-2">
                                <div>
                                    <label class="form-label">매입가</label>
                                    <div class="form-input-group with-unit">
                                        <input type="number" id="product-form-wholesale-price" placeholder="0" min="0" step="1000" class="form-control" oninput="calculateModalProfitMargin()">
                                        <span class="form-input-unit">원</span>
                                    </div>
                                    <div id="modal-profit-margin" class="form-helper"></div>
                                </div>
                                <div>
                                    <label class="form-label">배송 옵션</label>
                                    <select id="product-form-shipping" class="form-control">
                                        <option value="일반배송" selected>일반배송</option>
                                        <option value="무료배송">무료배송</option>
                                        <option value="배송비포함">배송비포함</option>
                                        <option value="직접배송">직접배송</option>
                                    </select>
                                </div>
                                <div>
                                    <label class="form-label">바코드</label>
                                    <input type="text" id="product-form-barcode" placeholder="예: 8801234567890" class="form-control" autocomplete="off">
                                </div>
                                <div class="col-span-2">
                                    <label class="form-label">상품설명</label>
                                    <textarea id="product-form-description" rows="2" placeholder="상품 설명 (선택)" class="form-control"></textarea>
                                </div>
                            </div>
                        </details>
                    </div>

                </form>
            </div>
            <div class="modal-footer">
                <button type="button" id="close-product-modal-btn" onclick="window.closeProductModal()" class="btn-secondary">취소</button>
                <button type="button" id="save-product-btn" class="btn-primary"><i class="fas fa-save mr-1"></i>저장</button>
            </div>
        </div>
    </div>

    <!-- 카메라 바코드 스캔 모달 -->
    <div id="barcode-scan-modal" class="modal-overlay hidden">
        <div class="modal-container modal-md">
            <div class="modal-header">
                <h3 class="modal-title"><i class="fas fa-camera mr-2"></i>바코드 스캔</h3>
                <button class="modal-close-btn" onclick="window.stopBarcodeScanner()"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body" style="padding:0;">
                <!-- 카메라 뷰파인더 -->
                <div id="barcode-scanner-view" style="width:100%;min-height:260px;background:#000;position:relative;">
                    <div id="barcode-scanner-reader" style="width:100%;"></div>
                    <!-- 조준선 -->
                    <div style="position:absolute;top:50%;left:10%;right:10%;height:2px;background:rgba(34,197,94,0.8);transform:translateY(-50%);pointer-events:none;box-shadow:0 0 8px rgba(34,197,94,0.6);"></div>
                </div>
                <!-- 상태 메시지 -->
                <div id="scan-status" class="px-4 py-3 text-center">
                    <p class="text-sm text-muted" id="scan-status-text">카메라를 바코드에 가져다 대세요</p>
                </div>
                <!-- 수동 입력 -->
                <div class="px-4 pb-4 border-t" style="border-color:var(--border);">
                    <p class="text-xs text-muted mt-3 mb-1">직접 입력</p>
                    <div class="flex gap-2">
                        <input type="text" id="manual-barcode-input" placeholder="바코드 번호 입력 또는 스캐너 연결" class="input-ui flex-1" inputmode="numeric" autocomplete="off">
                        <button onclick="window.processBarcodeResult(document.getElementById('manual-barcode-input').value)" class="btn-secondary" style="white-space:nowrap;">확인</button>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button onclick="window.stopBarcodeScanner()" class="btn-secondary">닫기</button>
            </div>
        </div>
    </div>

    <!-- 바코드 확대 모달 -->
    <div id="barcode-zoom-modal" class="modal-overlay hidden" onclick="if(event.target===this)this.classList.add('hidden')">
        <div class="modal-container modal-sm" style="text-align:center;">
            <div class="modal-header">
                <h3 class="modal-title" id="barcode-zoom-name"></h3>
                <button class="modal-close-btn" onclick="document.getElementById('barcode-zoom-modal').classList.add('hidden')"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body" style="display:flex;flex-direction:column;align-items:center;gap:12px;padding:24px;">
                <svg id="barcode-zoom-svg" style="width:100%;max-width:320px;"></svg>
                <span id="barcode-zoom-number" class="font-mono text-sm text-muted"></span>
            </div>
            <div class="modal-footer">
                <button onclick="document.getElementById('barcode-zoom-modal').classList.add('hidden')" class="btn-secondary">닫기</button>
                <button onclick="window.printSingleBarcode()" class="btn-primary"><i class="fas fa-print mr-1"></i>인쇄</button>
            </div>
        </div>
    </div>

    <!-- 바코드 인쇄 모달 -->
    <div id="barcode-print-modal" class="modal-overlay hidden">
        <div class="modal-container modal-lg">
            <div class="modal-header">
                <h3 class="modal-title"><i class="fas fa-barcode mr-2"></i>바코드 라벨 인쇄</h3>
                <button class="modal-close-btn" onclick="document.getElementById('barcode-print-modal').classList.add('hidden')"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body" style="max-height:60vh;overflow-y:auto;">
                <div class="flex items-center gap-2 mb-3">
                    <label class="text-xs text-muted">라벨 크기:</label>
                    <select id="barcode-size-select" class="input-ui text-xs" style="width:120px;">
                        <option value="sm">소 (40×20mm)</option>
                        <option value="md" selected>중 (60×30mm)</option>
                        <option value="lg">대 (80×40mm)</option>
                    </select>
                    <label class="text-xs text-muted ml-4">열 수:</label>
