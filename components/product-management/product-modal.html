<!-- 상품 등록/수정 모달 -->
<div id="product-modal" class="modal-overlay" style="display:none;">
    <div id="product-modal-content" class="modal-container modal-lg scale-95 opacity-0 transition-all duration-200">

        <!-- 헤더 -->
        <div class="modal-header">
            <span id="product-modal-title" class="modal-title">새 상품 등록</span>
            <button id="close-product-modal" onclick="window.closeProductModal()" class="modal-close-btn" title="닫기">
                <i class="fas fa-times"></i>
            </button>
        </div>

        <!-- 바디 -->
        <div class="modal-body">
            <form id="product-form" class="form-grid">
                <input type="hidden" id="product-form-id" name="product-id">
                <input type="hidden" id="product-form-created-at" name="product-created-at">

                <!-- 기본 정보 섹션 -->
                <!-- 상품명 (col-4) | 카테고리 (col-4) | 사이즈 (col-4) -->
                <div class="form-col-4">
                    <label class="form-label">상품명 <span class="req">*</span></label>
                    <div style="position:relative;">
                        <input type="text" id="product-form-name"
                               placeholder="예: White Platter (대)" required
                               class="form-control" autocomplete="off">
                        <div id="product-name-suggestions"
                             class="absolute z-50 w-full bg-white border border-gray-200 rounded-lg shadow-lg hidden max-h-48 overflow-y-auto"
                             style="top:100%;left:0;"></div>
                    </div>
                    <div id="product-code-display" class="form-helper hidden">
                        <i class="fas fa-barcode mr-1"></i>코드: <span id="product-code-value">자동 생성</span>
                    </div>
                    <div id="product-name-duplicate-warning" class="form-error hidden">
                        <i class="fas fa-exclamation-triangle mr-1"></i>이미 등록된 상품명입니다
                    </div>
                </div>

                <div class="form-col-4">
                    <label class="form-label">카테고리 <span class="req">*</span></label>
                    <div style="position:relative;">
                        <select id="product-form-category" required class="form-control" style="padding-right:32px;">
                            <option value="">카테고리 선택</option>
                            <option value="__ADD_NEW__" class="text-blue-600 font-medium">+ 새 카테고리 추가</option>
                        </select>
                        <button type="button" id="modal-quick-add-category-btn"
                                style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#2563eb;"
                                title="새 카테고리 빠른 추가">
                            <i class="fas fa-plus-circle text-sm"></i>
                        </button>
                    </div>
                </div>

                <div class="form-col-4">
                    <label class="form-label">사이즈</label>
                    <select id="product-form-size-select" class="form-control" onchange="handleSizeChange()">
                        <option value="">사이즈 선택</option>
                        <option value="SX">SX (초소형)</option>
                        <option value="S">S (소형)</option>
                        <option value="M">M (중형)</option>
                        <option value="L">L (대형)</option>
                        <option value="XL">XL (초대형)</option>
                        <option value="custom">직접 기입</option>
                    </select>
                    <input type="text" id="product-form-size-custom"
                           placeholder="예: 3-5cm, 특대, 혼합 등"
                           class="form-control hidden" style="margin-top:6px;">
                </div>

                <!-- 가격 / 재고 섹션 -->
                <!-- 판매가 (col-4) | 매입가 (col-4) | 재고수량 (col-4) -->
                <div class="form-col-4">
                    <label class="form-label">판매가 <span class="req">*</span></label>
                    <div class="form-input-group with-unit">
                        <input type="number" id="product-form-price"
                               placeholder="0" min="0" step="1000" required
                               class="form-control" oninput="calculateModalProfitMargin()">
                        <span class="form-input-unit">원</span>
                    </div>
                </div>

                <div class="form-col-4">
                    <label class="form-label">매입가</label>
                    <div class="form-input-group with-unit">
                        <input type="number" id="product-form-wholesale-price"
                               placeholder="0" min="0" step="1000"
                               class="form-control" oninput="calculateModalProfitMargin()">
                        <span class="form-input-unit">원</span>
                    </div>
                    <div id="modal-profit-margin" class="form-helper"></div>
                </div>

                <div class="form-col-4">
                    <label class="form-label">재고수량 <span class="req">*</span></label>
                    <div class="form-input-group with-unit">
                        <input type="number" id="product-form-stock"
                               placeholder="0" min="0" required
                               class="form-control">
                        <span class="form-input-unit">개</span>
                    </div>
                </div>

                <!-- 배송 옵션 (col-6) | 이미지 URL (col-6) -->
                <div class="form-col-6">
                    <label class="form-label">배송 옵션 <span class="req">*</span></label>
                    <select id="product-form-shipping" required class="form-control">
                        <option value="">배송 옵션 선택</option>
                        <option value="일반배송" selected>일반배송 (조건부 무료)</option>
                        <option value="무료배송">무료배송 (행사상품)</option>
                        <option value="배송비포함">배송비포함 (단독배송)</option>
                        <option value="직접배송">직접배송 (농장배송)</option>
                    </select>
                </div>

                <div class="form-col-6">
                    <label class="form-label">상품 이미지 URL</label>
                    <input type="url" id="product-form-image"
                           placeholder="https://example.com/image.jpg"
                           class="form-control">
                </div>

                <!-- 상품설명 (col-12) -->
                <div class="form-col-12">
                    <label class="form-label">상품설명</label>
                    <textarea id="product-form-description" rows="3"
                              placeholder="상품에 대한 자세한 설명을 입력하세요"
                              class="form-control"></textarea>
                </div>

            </form>
        </div>

        <!-- 푸터 -->
        <div class="modal-footer">
            <button type="button" id="close-product-modal-btn" onclick="window.closeProductModal()" class="btn-secondary">
                <i class="fas fa-times"></i>취소
            </button>
            <button type="button" id="save-product-btn" class="btn-primary">
                <i class="fas fa-save"></i>저장
            </button>
        </div>

    </div>
</div>
