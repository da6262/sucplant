<!-- 환경설정 컴포넌트 -->
<div id="settings-content" class="flex flex-col h-[calc(100vh-3.5rem)] min-h-0">

    <!-- 헤더 -->
    <div class="page-header">
        <div>
            <h2>환경설정</h2>
            <p class="page-subtitle">농장 기본값, 배송·채널·등급 등 시스템 설정</p>
        </div>
        <div class="action-group">
            <button id="reset-settings-btn" class="btn-secondary"><i class="fas fa-undo"></i>초기화</button>
            <button id="save-all-settings-btn" class="btn-primary"><i class="fas fa-save"></i>모든 설정 저장</button>
        </div>
    </div>

    <!-- 탭 네비게이션 -->
    <div class="shrink-0 px-3 py-1.5 border-b border-gray-100 bg-white">
        <div class="flex items-center gap-0.5 flex-nowrap overflow-x-auto" style="scrollbar-width:none;">
            <button id="settings-tab-general"   class="settings-tab-btn"><i class="fas fa-cog"></i><span>일반</span></button>
            <button id="settings-tab-shipping"  class="settings-tab-btn"><i class="fas fa-truck"></i><span>배송</span></button>
            <button id="settings-tab-channels"  class="settings-tab-btn"><i class="fas fa-store"></i><span>판매채널</span></button>
            <button id="settings-tab-orders"    class="settings-tab-btn"><i class="fas fa-tasks"></i><span>주문상태</span></button>
            <button id="settings-tab-customers" class="settings-tab-btn"><i class="fas fa-crown"></i><span>고객등급</span></button>
            <button id="settings-tab-sms"       class="settings-tab-btn"><i class="fas fa-sms"></i><span>SMS</span></button>
        </div>
    </div>

    <!-- 콘텐츠 영역 -->
    <div class="flex-1 overflow-auto">

        <!-- 일반 설정 -->
        <div id="settings-general-section" class="settings-content">
            <div class="grid grid-cols-12 gap-x-3 gap-y-2 px-3 py-3">

                <!-- 좌측: 로고 + 사이드바 설정 (col-3) -->
                <div class="col-span-3 flex flex-col items-center gap-2 border-r pr-3" style="border-color:var(--border);">
                    <div id="farm-logo-preview" class="w-24 h-24 rounded-lg border flex items-center justify-center overflow-hidden bg-section" style="border-color:var(--border);">
                        <i class="fas fa-image text-muted" id="farm-logo-placeholder"></i>
                        <img id="farm-logo-img" class="w-full h-full object-contain hidden" alt="로고">
                    </div>
                    <input type="file" id="farm-logo-file" accept="image/*" class="hidden" onchange="window._handleFarmLogoSelect(this)">
                    <div class="flex gap-1">
                        <button type="button" class="btn-secondary btn-xs" onclick="document.getElementById('farm-logo-file').click()"><i class="fas fa-upload"></i></button>
                        <button type="button" id="farm-logo-remove" class="btn-secondary btn-xs hidden" onclick="window._removeFarmLogo()"><i class="fas fa-times"></i></button>
                    </div>
                    <input type="hidden" id="farm-logo-url">
                    <input type="text" id="farm-sidebar-title" class="form-control text-center" placeholder="경산다육" style="font-size:11px;"
                           oninput="const el=document.getElementById('sidebar-title');if(el)el.textContent=this.value||'경산다육';">
                    <input type="text" id="farm-sidebar-subtitle" class="form-control text-center" placeholder="식물농장 관리" style="font-size:10px;"
                           oninput="const el=document.getElementById('sidebar-subtitle');if(el)el.textContent=this.value||'식물농장 관리';">
                </div>

                <!-- 우측: 농장 정보 (col-9) -->
                <div class="col-span-9 grid grid-cols-12 gap-x-3 gap-y-1.5">
                    <div class="col-span-4">
                        <label class="form-label">농장명</label>
                        <input type="text" id="farm-name" class="form-control" placeholder="경산다육식물농장">
                    </div>
                    <div class="col-span-4">
                        <label class="form-label">대표자명</label>
                        <input type="text" id="farm-owner" class="form-control" placeholder="대표자명">
                    </div>
                    <div class="col-span-4">
                        <label class="form-label">사업자등록번호</label>
                        <input type="text" id="farm-business-number" class="form-control" placeholder="000-00-00000" maxlength="12"
                               oninput="let v=this.value.replace(/[^0-9]/g,'');if(v.length>3&&v.length<=5)v=v.slice(0,3)+'-'+v.slice(3);else if(v.length>5)v=v.slice(0,3)+'-'+v.slice(3,5)+'-'+v.slice(5,10);this.value=v;">
                    </div>
                    <div class="col-span-4">
                        <label class="form-label">대표 연락처</label>
                        <input type="tel" id="farm-phone" class="form-control" placeholder="010-0000-0000" maxlength="13"
                               oninput="let v=this.value.replace(/[^0-9]/g,'');if(v.length>3&&v.length<=7)v=v.slice(0,3)+'-'+v.slice(3);else if(v.length>7)v=v.slice(0,3)+'-'+v.slice(3,7)+'-'+v.slice(7,11);this.value=v;">
                    </div>
                    <div class="col-span-4">
                        <label class="form-label">이메일</label>
                        <input type="email" id="farm-email" class="form-control" placeholder="example@email.com">
                    </div>
                    <div class="col-span-4"></div>
                    <div class="col-span-12">
                        <label class="form-label">주소</label>
                        <input type="text" id="farm-address" class="form-control" placeholder="농장 주소">
                    </div>
                    <div class="col-span-3">
                        <label class="form-label">은행</label>
                        <input type="text" id="farm-bank-name" class="form-control" placeholder="농협">
                    </div>
                    <div class="col-span-5">
                        <label class="form-label">계좌번호</label>
                        <input type="text" id="farm-bank-account" class="form-control" placeholder="000-0000-0000-00">
                    </div>
                    <div class="col-span-4">
                        <label class="form-label">예금주</label>
                        <input type="text" id="farm-bank-holder" class="form-control" placeholder="대표자명">
                    </div>
                </div>

                <!-- 버튼 (col-12) -->
                <div class="col-span-12 flex justify-end gap-2 pt-2 border-t" style="border-color:var(--border);">
                    <button id="cancel-general-settings" class="btn-secondary"><i class="fas fa-times"></i>취소</button>
                    <button id="save-general-settings" class="btn-primary"><i class="fas fa-save"></i>저장</button>
                </div>

            </div>
        </div>

        <!-- 배송 설정 -->
        <div id="settings-shipping-section" class="settings-content hidden">
            <div class="form-grid">

                <!-- 기본 배송비 (col-6) | 도서산간 추가배송비 (col-6) -->
                <div class="form-col-6">
                    <label class="form-label">기본 배송비</label>
                    <div class="form-input-group with-unit">
                        <input type="number" id="default-shipping-fee" class="form-control" placeholder="3000">
                        <span class="form-input-unit">원</span>
                    </div>
                </div>
                <div class="form-col-6">
                    <label class="form-label">도서산간 추가배송비</label>
                    <div class="form-input-group with-unit">
                        <input type="number" id="remote-area-shipping-fee" class="form-control" placeholder="5000">
                        <span class="form-input-unit">원</span>
                    </div>
                </div>

                <!-- 무료배송 기준 (form-section, col-12) -->
                <div class="form-section">
                    <div class="form-section-title">무료배송 기준</div>
                    <div class="space-y-2">
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="radio" name="free-shipping-type" value="total-order"
                                   class="checkbox-ui" checked>
                            <span class="text-xs text-body">전체 주문금액 기준</span>
                        </label>
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="radio" name="free-shipping-type" value="single-item"
                                   class="checkbox-ui">
                            <span class="text-xs text-body">단일 상품금액 기준</span>
                        </label>
                        <div class="form-input-group with-unit" style="max-width:240px;margin-top:6px;">
                            <input type="number" id="free-shipping-threshold" class="form-control" placeholder="50000">
                            <span class="form-input-unit">원 이상</span>
                        </div>
                        <p class="form-helper"><span id="free-shipping-description">전체 주문금액이 설정된 금액 이상일 때 무료배송</span></p>
                    </div>
                </div>

                <!-- 로젠택배 운임 (col-6) | 운임구분 (col-6) -->
                <div class="form-col-6">
                    <label class="form-label">로젠택배 운임</label>
                    <div class="form-input-group with-unit">
                        <input type="number" id="logen-shipping-fee" class="form-control" placeholder="3800">
                        <span class="form-input-unit">원</span>
                    </div>
                    <p class="form-helper">로젠 엑셀 내보내기 시 택배운임으로 사용</p>
                </div>
                <div class="form-col-6">
                    <label class="form-label">로젠 운임구분</label>
                    <select id="logen-freight-type" class="form-control">
                        <option value="10">선불 (10)</option>
                        <option value="20">착불 (20)</option>
                    </select>
                    <p class="form-helper">로젠 엑셀 내보내기 시 운임구분 코드</p>
                </div>

                <!-- 배송 방법 목록 (col-12) -->
                <div class="form-col-12">
                    <label class="form-label">배송 방법 목록 <span class="form-helper" style="font-weight:400;">(쉼표로 구분, 주문 등록 드롭다운에 반영됨)</span></label>
                    <input type="text" id="shipping-methods-input" class="form-control"
                           placeholder="택배, 직접배송, 픽업">
                    <p class="form-helper" style="margin-top:4px;">예: 택배, 직접배송, 픽업 &nbsp;·&nbsp; 픽업·방문·수령이 포함된 방법은 자동으로 배송비 무료 처리됩니다.</p>
                </div>

                <!-- 버튼 영역 -->
                <div class="form-actions">
                    <button id="cancel-shipping-settings" class="btn-secondary"><i class="fas fa-times"></i>취소</button>
                    <button type="button" id="save-shipping-settings" class="btn-primary"><i class="fas fa-save"></i>저장</button>
                </div>

            </div>
        </div>

        <!-- 판매 채널 -->
        <div id="settings-channels-section" class="settings-content hidden">
            <div class="flex items-center justify-between px-3 py-2 border-b border-gray-100 bg-section">
                <span class="text-xs font-medium text-body">판매 채널</span>
                <button id="add-channel-btn" class="btn-primary"><i class="fas fa-plus"></i>채널 추가</button>
            </div>
            <div id="channels-list" class="divide-y divide-gray-100"></div>
        </div>

        <!-- 주문 상태 -->
        <div id="settings-orders-section" class="settings-content hidden">
            <div class="flex items-center justify-between px-3 py-2 border-b border-gray-100 bg-section">
                <span class="text-xs font-medium text-body">주문 상태</span>
                <button id="add-order-status-btn" class="btn-primary"><i class="fas fa-plus"></i>상태 추가</button>
            </div>
            <div id="order-statuses-list" class="divide-y divide-gray-100"></div>
        </div>

        <!-- 고객등급 -->
        <div id="settings-customers-section" class="settings-content hidden">
            <div class="flex items-center justify-between px-3 py-2 border-b border-gray-100 bg-section">
                <span class="text-xs font-medium text-body">고객등급</span>
                <div class="flex gap-1.5">
                    <button id="force-update-grades-btn" class="btn-secondary"><i class="fas fa-sync"></i>5단계 업데이트</button>
                    <button id="add-customer-grade-btn" class="btn-primary"><i class="fas fa-plus"></i>등급 추가</button>
                </div>
            </div>
            <div class="flex items-center px-3 py-2 border-b border-gray-100">
                <label class="text-xs text-muted w-28 shrink-0"><i class="fas fa-calendar-alt mr-1"></i>등급 적용 기간</label>
                <div class="flex items-center gap-2 flex-1">
                    <select id="grade-period-select" class="input-ui flex-1">
                        <option value="all">전체 기간 (누적)</option>
                        <option value="1year">최근 1년</option>
                        <option value="6months">최근 6개월</option>
                        <option value="3months">최근 3개월</option>
                    </select>
                    <button id="save-grade-period-btn" class="btn-primary shrink-0"><i class="fas fa-save"></i>저장</button>
                    <button id="recalculate-all-grades-btn" class="btn-secondary shrink-0"><i class="fas fa-sync-alt"></i>전체 재계산</button>
                </div>
            </div>
            <div id="settings-customer-grades-list" class="divide-y divide-gray-100"></div>
        </div>

        <!-- SMS 설정 -->
        <div id="settings-sms-section" class="settings-content hidden">
            <!-- 솔라피 API 인증정보 -->
            <div class="form-grid border-b" style="border-color:var(--border);">
                <div class="form-col-12">
                    <span class="form-section-title">솔라피 API 인증정보</span>
                </div>
                <div class="form-col-12">
                    <label class="form-label">API Key</label>
                    <input type="text" id="sms-api-key" class="form-control font-mono" placeholder="솔라피 API Key">
                </div>
                <div class="form-col-12">
                    <label class="form-label">API Secret</label>
                    <input type="password" id="sms-api-secret" class="form-control font-mono" placeholder="솔라피 API Secret">
                </div>
                <div class="form-col-12">
                    <label class="form-label">발신번호</label>
                    <input type="tel" id="sms-from-number" class="form-control" placeholder="01012345678 (- 없이)">
                    <p class="form-helper">하이픈(-) 없이 숫자만 입력하세요</p>
                </div>
                <div class="form-actions">
                    <button id="save-sms-config-btn" class="btn-primary"><i class="fas fa-save"></i>인증정보 저장</button>
                </div>
            </div>
            <!-- SMS 문자 템플릿 -->
            <div class="flex items-center px-3 py-2 bg-section border-b border-gray-200">
                <span class="text-xs font-semibold text-body">문자 템플릿</span>
            </div>
            <div id="sms-templates-list" class="divide-y divide-gray-100"></div>
        </div>

    </div><!-- /콘텐츠 영역 -->
</div>
