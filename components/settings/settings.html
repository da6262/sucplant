<!-- 환경설정 컴포넌트 -->
<div id="settings-content" class="flex flex-col h-[calc(100vh-3.5rem)] min-h-0">

    <!-- 헤더 -->
    <div class="page-header">
        <div>
            <h2>환경설정</h2>
            <p class="page-subtitle">농장 기본값, 배송·채널·등급 등 시스템 설정</p>
        </div>
        <div class="action-group">
            <button id="reset-settings-btn" class="btn-secondary"><i class="fas fa-undo"></i>초기화</button>
            <button id="save-all-settings-btn" class="btn-primary"><i class="fas fa-save"></i>모든 설정 저장</button>
        </div>
    </div>

    <!-- 탭 네비게이션 -->
    <div class="shrink-0 px-3 py-1.5 border-b border-gray-100 bg-white">
        <div class="flex items-center gap-0.5 flex-nowrap overflow-x-auto" style="scrollbar-width:none;">
            <button id="settings-tab-general"   class="settings-tab-btn"><i class="fas fa-cog"></i><span>일반</span></button>
            <button id="settings-tab-shipping"  class="settings-tab-btn"><i class="fas fa-truck"></i><span>배송</span></button>
            <button id="settings-tab-channels"  class="settings-tab-btn"><i class="fas fa-store"></i><span>판매채널</span></button>
            <button id="settings-tab-orders"    class="settings-tab-btn"><i class="fas fa-tasks"></i><span>주문상태</span></button>
            <button id="settings-tab-customers" class="settings-tab-btn"><i class="fas fa-crown"></i><span>고객등급</span></button>
            <button id="settings-tab-sms"       class="settings-tab-btn"><i class="fas fa-sms"></i><span>SMS</span></button>
        </div>
    </div>

    <!-- 콘텐츠 영역 -->
    <div class="flex-1 overflow-auto">

        <!-- 일반 설정 -->
        <div id="settings-general-section" class="settings-content">
            <div class="divide-y divide-gray-100">
                <div class="flex items-center px-3 py-2">
                    <label class="text-xs text-gray-500 w-28 shrink-0">농장명</label>
                    <input type="text" id="farm-name" class="input-ui flex-1" placeholder="경산다육식물농장">
                </div>
                <div class="flex items-center px-3 py-2">
                    <label class="text-xs text-gray-500 w-28 shrink-0">대표자명</label>
                    <input type="text" id="farm-owner" class="input-ui flex-1" placeholder="대표자명">
                </div>
                <div class="flex items-center px-3 py-2">
                    <label class="text-xs text-gray-500 w-28 shrink-0">연락처</label>
                    <input type="tel" id="farm-phone" class="input-ui flex-1" placeholder="010-0000-0000">
                </div>
                <div class="flex items-center px-3 py-2">
                    <label class="text-xs text-gray-500 w-28 shrink-0">주소</label>
                    <input type="text" id="farm-address" class="input-ui flex-1" placeholder="농장 주소">
                </div>
                <div class="flex justify-end gap-2 px-3 py-2 bg-gray-50">
                    <button id="cancel-general-settings" class="btn-secondary"><i class="fas fa-times"></i>취소</button>
                    <button id="save-general-settings" class="btn-primary"><i class="fas fa-save"></i>저장</button>
                </div>
            </div>
        </div>

        <!-- 배송 설정 -->
        <div id="settings-shipping-section" class="settings-content hidden">
            <div class="divide-y divide-gray-100">
                <div class="flex items-center px-3 py-2">
                    <label class="text-xs text-gray-500 w-28 shrink-0">기본 배송비</label>
                    <div class="flex items-center gap-2 flex-1">
                        <input type="number" id="default-shipping-fee" class="input-ui flex-1" placeholder="3000">
                        <span class="text-xs text-gray-500 shrink-0">원</span>
                    </div>
                </div>
                <div class="flex items-start px-3 py-2">
                    <label class="text-xs text-gray-500 w-28 shrink-0 pt-0.5">무료배송 기준</label>
                    <div class="flex-1 space-y-1">
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="radio" name="free-shipping-type" value="total-order" class="text-emerald-600 focus:ring-emerald-500" checked>
                            <span class="text-xs text-gray-700">전체 주문금액 기준</span>
                        </label>
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="radio" name="free-shipping-type" value="single-item" class="text-emerald-600 focus:ring-emerald-500">
                            <span class="text-xs text-gray-700">단일 상품금액 기준</span>
                        </label>
                        <div class="flex items-center gap-2 pt-1">
                            <input type="number" id="free-shipping-threshold" class="input-ui flex-1" placeholder="50000">
                            <span class="text-xs text-gray-500 shrink-0">원 이상</span>
                        </div>
                        <p class="text-[11px] text-gray-400"><span id="free-shipping-description">전체 주문금액이 설정된 금액 이상일 때 무료배송</span></p>
                    </div>
                </div>
                <div class="flex items-center px-3 py-2">
                    <label class="text-xs text-gray-500 w-28 shrink-0">당일배송 배송비</label>
                    <div class="flex items-center gap-2 flex-1">
                        <input type="number" id="express-shipping-fee" class="input-ui flex-1" placeholder="5000">
                        <span class="text-xs text-gray-500 shrink-0">원</span>
                    </div>
                </div>
                <div class="flex justify-end gap-2 px-3 py-2 bg-gray-50">
                    <button id="cancel-shipping-settings" class="btn-secondary"><i class="fas fa-times"></i>취소</button>
                    <button type="button" id="save-shipping-settings" class="btn-primary"><i class="fas fa-save"></i>저장</button>
                </div>
            </div>
        </div>

        <!-- 판매 채널 -->
        <div id="settings-channels-section" class="settings-content hidden">
            <div class="flex items-center justify-between px-3 py-2 border-b border-gray-100 bg-gray-50">
                <span class="text-xs font-medium text-gray-600">판매 채널</span>
                <button id="add-channel-btn" class="btn-primary"><i class="fas fa-plus"></i>채널 추가</button>
            </div>
            <div id="channels-list" class="divide-y divide-gray-100"></div>
        </div>

        <!-- 주문 상태 -->
        <div id="settings-orders-section" class="settings-content hidden">
            <div class="flex items-center justify-between px-3 py-2 border-b border-gray-100 bg-gray-50">
                <span class="text-xs font-medium text-gray-600">주문 상태</span>
                <button id="add-order-status-btn" class="btn-primary"><i class="fas fa-plus"></i>상태 추가</button>
            </div>
            <div id="order-statuses-list" class="divide-y divide-gray-100"></div>
        </div>

        <!-- 고객등급 -->
        <div id="settings-customers-section" class="settings-content hidden">
            <div class="flex items-center justify-between px-3 py-2 border-b border-gray-100 bg-gray-50">
                <span class="text-xs font-medium text-gray-600">고객등급</span>
                <div class="flex gap-1.5">
                    <button id="force-update-grades-btn" class="btn-secondary"><i class="fas fa-sync"></i>5단계 업데이트</button>
                    <button id="add-customer-grade-btn" class="btn-primary"><i class="fas fa-plus"></i>등급 추가</button>
                </div>
            </div>
            <div class="flex items-center px-3 py-2 border-b border-gray-100">
                <label class="text-xs text-gray-500 w-28 shrink-0"><i class="fas fa-calendar-alt mr-1"></i>등급 적용 기간</label>
                <div class="flex items-center gap-2 flex-1">
                    <select id="grade-period-select" class="input-ui flex-1">
                        <option value="all">전체 기간 (누적)</option>
                        <option value="1year">최근 1년</option>
                        <option value="6months">최근 6개월</option>
                        <option value="3months">최근 3개월</option>
                    </select>
                    <button id="save-grade-period-btn" class="btn-primary shrink-0"><i class="fas fa-save"></i>저장</button>
                    <button id="recalculate-all-grades-btn" class="btn-secondary shrink-0"><i class="fas fa-sync-alt"></i>전체 재계산</button>
                </div>
            </div>
            <div id="customer-grades-list" class="divide-y divide-gray-100"></div>
        </div>

        <!-- SMS 설정 -->
        <div id="settings-sms-section" class="settings-content hidden">
            <!-- 솔라피 API 인증정보 -->
            <div class="divide-y divide-gray-100 border-b border-gray-200 mb-0">
                <div class="flex items-center px-3 py-2 bg-gray-50">
                    <span class="text-xs font-semibold text-gray-600 w-full">솔라피 API 인증정보</span>
                </div>
                <div class="flex items-center px-3 py-2">
                    <label class="text-xs text-gray-500 w-28 shrink-0">API Key</label>
                    <input type="text" id="sms-api-key" class="input-ui flex-1 font-mono text-xs" placeholder="솔라피 API Key">
                </div>
                <div class="flex items-center px-3 py-2">
                    <label class="text-xs text-gray-500 w-28 shrink-0">API Secret</label>
                    <input type="password" id="sms-api-secret" class="input-ui flex-1 font-mono text-xs" placeholder="솔라피 API Secret">
                </div>
                <div class="flex items-center px-3 py-2">
                    <label class="text-xs text-gray-500 w-28 shrink-0">발신번호</label>
                    <input type="tel" id="sms-from-number" class="input-ui flex-1" placeholder="01012345678 (- 없이)">
                </div>
                <div class="flex justify-end gap-2 px-3 py-2">
                    <button id="save-sms-config-btn" class="btn-primary"><i class="fas fa-save"></i>인증정보 저장</button>
                </div>
            </div>
            <!-- SMS 문자 템플릿 -->
            <div class="flex items-center px-3 py-2 bg-gray-50 border-b border-gray-200">
                <span class="text-xs font-semibold text-gray-600">문자 템플릿</span>
            </div>
            <div id="sms-templates-list" class="divide-y divide-gray-100"></div>
        </div>

    </div><!-- /콘텐츠 영역 -->
</div>
