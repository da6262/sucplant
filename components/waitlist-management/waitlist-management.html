<!-- 대기자 관리 컴포넌트 -->
<div class="bg-white rounded-lg shadow-md">
    <div class="p-6 border-b border-gray-200">
        <div class="page-header mb-4">
            <div>
                <div class="page-title">대기자 관리</div>
                <div class="page-desc">상품 입고 시 연락할 고객들</div>
            </div>
            <div class="flex gap-2">
                <button id="add-waitlist-btn" class="btn-primary">
                    <i class="fas fa-user-clock"></i>새 대기자 등록
                </button>
                <button onclick="orderDataManager.emergencyWaitlistRecovery()" class="btn-secondary" title="대기자 데이터 복구">
                    <i class="fas fa-ambulance"></i>데이터 복구
                </button>
            </div>
        </div>
        
        <!-- 대기자 통계 -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4">
            <div class="card-ui p-3 flex items-center gap-2">
                <i class="fas fa-clock text-amber-500 text-lg"></i>
                <div>
                    <p class="text-xs text-gray-500">대기중</p>
                    <p id="waitlist-waiting-count" class="text-lg font-bold text-gray-800">0</p>
                </div>
            </div>
            <div class="card-ui p-3 flex items-center gap-2">
                <i class="fas fa-phone text-blue-500 text-lg"></i>
                <div>
                    <p class="text-xs text-gray-500">연락완료</p>
                    <p id="waitlist-contacted-count" class="text-lg font-bold text-gray-800">0</p>
                </div>
            </div>
            <div class="card-ui p-3 flex items-center gap-2">
                <i class="fas fa-shopping-cart text-green-500 text-lg"></i>
                <div>
                    <p class="text-xs text-gray-500">주문전환</p>
                    <p id="waitlist-converted-count" class="text-lg font-bold text-gray-800">0</p>
                </div>
            </div>
            <div class="card-ui p-3 flex items-center gap-2">
                <i class="fas fa-times-circle text-red-400 text-lg"></i>
                <div>
                    <p class="text-xs text-gray-500">취소</p>
                    <p id="waitlist-cancelled-count" class="text-lg font-bold text-gray-800">0</p>
                </div>
            </div>
        </div>

        <!-- 대기자 상태별 필터 탭 -->
        <div class="mb-4">
            <nav class="flex gap-1 flex-wrap">
                <button id="farm_waitlist-status-all" class="status-tab-btn active">
                    전체 <span class="tab-count" id="waitlist-count-all">0</span>
                </button>
                <button id="farm_waitlist-status-대기중" class="status-tab-btn">
                    대기중 <span class="tab-count" id="waitlist-count-대기중">0</span>
                </button>
                <button id="farm_waitlist-status-연락완료" class="status-tab-btn">
                    연락완료 <span class="tab-count" id="waitlist-count-연락완료">0</span>
                </button>
                <button id="farm_waitlist-status-주문전환" class="status-tab-btn">
                    주문전환 <span class="tab-count" id="waitlist-count-주문전환">0</span>
                </button>
                <button id="farm_waitlist-status-취소" class="status-tab-btn">
                    취소 <span class="tab-count" id="waitlist-count-취소">0</span>
                </button>
            </nav>
        </div>

        <!-- 검색 바 -->
        <div class="flex gap-2">
            <input type="text" id="waitlist-search" placeholder="고객명, 전화번호, 상품명으로 검색..."
                   class="input-ui flex-1">
            <button id="reset-waitlist-search" class="btn-secondary">
                <i class="fas fa-refresh"></i>
            </button>
        </div>
    </div>
    
    <!-- 대기자 목록 -->
    <div class="p-6">
        <div class="overflow-x-auto">
            <table class="min-w-full divide-y divide-gray-200">
                <thead class="bg-gray-50">
                    <tr>
                        <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">번호</th>
                        <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">고객명</th>
                        <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">연락처</th>
                        <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">희망상품</th>
                        <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">카테고리</th>
                        <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">희망가격</th>
                        <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">상태</th>
                        <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">등록일</th>
                        <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">관리</th>
                    </tr>
                </thead>
                <tbody id="waitlist-tbody" class="bg-white divide-y divide-gray-200">
                    <!-- 대기자 목록이 여기에 표시됩니다 -->
                </tbody>
            </table>
        </div>
    </div>
</div>
