<!-- 대기자 관리 컴포넌트 -->
<div class="flex flex-col h-[calc(100vh-3.5rem)] min-h-0 bg-white">

    <!-- 헤더 -->
    <div class="page-header">
        <h2>대기자 관리</h2>
        <div class="action-group">
            <button onclick="waitlistDataManager.emergencyWaitlistRecovery()" class="btn-secondary" title="대기자 데이터 복구">
                <i class="fas fa-ambulance"></i>복구
            </button>
            <button id="add-waitlist-btn" class="btn-primary">
                <i class="fas fa-user-clock"></i>새 대기자 등록
            </button>
        </div>
    </div>

    <!-- 단일 필터 바: 검색 + 초기화 + | + 상태 탭 -->
    <div class="filter-bar" style="flex-wrap:nowrap; overflow-x:auto; scrollbar-width:none; -ms-overflow-style:none;">
        <input type="text" id="waitlist-search" placeholder="고객명, 전화번호, 상품명..." class="input-ui" style="max-width:180px; flex-shrink:0;">
        <button id="reset-waitlist-search" class="btn-secondary" style="flex-shrink:0;"><i class="fas fa-times"></i>초기화</button>
        <span style="flex-shrink:0; color:#D1D5DB; font-size:12px; padding:0 4px; user-select:none;">|</span>
        <nav class="flex gap-0.5 flex-nowrap overflow-x-auto" style="scrollbar-width:none;-ms-overflow-style:none;">
            <button id="farm_waitlist-status-all"     class="status-tab-btn waitlist-tab-btn active">전체     <span class="tab-count" id="waitlist-count-all">0</span></button>
            <button id="farm_waitlist-status-대기중"   class="status-tab-btn waitlist-tab-btn">대기중   <span class="tab-count" id="waitlist-count-대기중">0</span></button>
            <button id="farm_waitlist-status-연락완료"  class="status-tab-btn waitlist-tab-btn">연락완료  <span class="tab-count" id="waitlist-count-연락완료">0</span></button>
            <button id="farm_waitlist-status-주문전환"  class="status-tab-btn waitlist-tab-btn">주문전환  <span class="tab-count" id="waitlist-count-주문전환">0</span></button>
            <button id="farm_waitlist-status-취소"    class="status-tab-btn waitlist-tab-btn">취소     <span class="tab-count" id="waitlist-count-취소">0</span></button>
        </nav>
    </div>

    <!-- 대기자 목록 테이블 -->
    <div class="flex-1 overflow-auto">
        <table class="table-ui">
            <thead>
                <tr>
                    <th class="text-center">번호</th>
                    <th class="text-left">고객명</th>
                    <th class="text-left">연락처</th>
                    <th class="text-left">희망상품</th>
                    <th class="text-left">카테고리</th>
                    <th class="text-right">희망가격</th>
                    <th class="text-center">상태</th>
                    <th class="text-left">등록일</th>
                    <th class="text-center">관리</th>
                </tr>
            </thead>
            <tbody id="waitlist-tbody">
                <!-- 대기자 목록이 여기에 표시됩니다 -->
            </tbody>
        </table>
    </div>

    <!-- 하단 상태 바 -->
    <footer id="waitlist-status-footer" class="shrink-0 px-3 py-1 border-t border-gray-200 bg-section text-xs text-body flex items-center justify-between">
        <span>총 <strong id="waitlist-status-total">0</strong>명 · <span id="waitlist-list-count">0명 표시</span></span>
        <div class="flex items-center gap-2">
            <label class="flex items-center gap-1 text-muted">표시
                <select id="waitlist-page-size" class="border border-gray-200 rounded px-1 py-0.5 text-xs bg-white focus:ring-1 focus:ring-emerald-500 focus:border-emerald-500">
                    <option value="10">10명</option>
                    <option value="20" selected>20명</option>
                    <option value="50">50명</option>
                    <option value="0">전체</option>
                </select>
            </label>
        </div>
    </footer>

</div>
