<!-- 대기자 등록/수정 모달 -->
<div id="waitlist-modal" class="modal-overlay" style="display:none;">
    <div class="modal-container modal-md">

        <!-- 헤더 -->
        <div class="modal-header">
            <span id="waitlist-modal-title" class="modal-title">새 대기자 등록</span>
            <button id="close-waitlist-modal" class="modal-close-btn" title="닫기">
                <i class="fas fa-times"></i>
            </button>
        </div>

        <!-- 바디 -->
        <div class="modal-body">
            <form id="waitlist-form" class="form-grid">

                <!-- 고객명 (col-6) | 연락처 (col-6) -->
                <div class="form-col-6">
                    <label class="form-label">고객명 <span class="req">*</span></label>
                    <input type="text" id="waitlist-customer-name" class="form-control" required>
                </div>
                <div class="form-col-6">
                    <label class="form-label">연락처</label>
                    <input type="tel" id="waitlist-customer-phone" class="form-control" placeholder="010-0000-0000">
                </div>

                <!-- 상품 정보 그룹 -->
                <div class="form-section">
                    <div class="form-section-title">상품 정보</div>
                    <div class="form-section-inner">

                        <!-- 희망상품명 (col-6) | 상품카테고리 (col-6) -->
                        <div class="form-col-6">
                            <label class="form-label">희망상품명 <span class="req">*</span></label>
                            <input type="text" id="waitlist-product-name" class="form-control" required>
                        </div>
                        <div class="form-col-6">
                            <label class="form-label">상품카테고리</label>
                            <input type="text" id="waitlist-product-category" class="form-control" placeholder="예: 다육식물">
                        </div>

                        <!-- 희망가격 (col-6) | 우선순위 (col-6) -->
                        <div class="form-col-6">
                            <label class="form-label">희망가격</label>
                            <div class="form-input-group with-unit">
                                <input type="number" id="waitlist-expected-price" class="form-control" placeholder="0">
                                <span class="form-input-unit">원</span>
                            </div>
                        </div>
                        <div class="form-col-6">
                            <label class="form-label">우선순위</label>
                            <select id="waitlist-priority" class="form-control">
                                <option value="1">높음</option>
                                <option value="2">보통</option>
                                <option value="3" selected>낮음</option>
                            </select>
                        </div>

                    </div>
                </div>

                <!-- 메모 (col-12) -->
                <div class="form-col-12">
                    <label class="form-label">메모</label>
                    <textarea id="waitlist-memo" rows="3" class="form-control"
                              placeholder="특이사항, 요청사항 등 (선택)"></textarea>
                </div>

            </form>
        </div>

        <!-- 푸터 -->
        <div class="modal-footer">
            <button type="button" id="cancel-waitlist-btn" class="btn-secondary">취소</button>
            <button type="submit" form="waitlist-form" class="btn-primary">
                <i class="fas fa-save"></i>등록
            </button>
        </div>

    </div>
</div>
