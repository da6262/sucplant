<!-- 주문 등록/수정 — 가운데 팝업 -->
<div id="order-modal" class="hidden fixed inset-0 z-[500]">
    <style>
        #order-modal .order-management-only,
        #order-modal #shipping-settings-btn {
            display: none !important;
            visibility: hidden !important;
            pointer-events: none !important;
            position: absolute !important;
            left: -9999px !important;
        }
        #order-modal-content {
            animation: panelSlideIn 0.22s ease-out;
        }
        @keyframes panelSlideIn {
            from { transform: translate(-50%, -46%); opacity: 0.6; }
            to   { transform: translate(-50%, -50%); opacity: 1; }
        }
        #order-panel-body::-webkit-scrollbar { width: 5px; }
        #order-panel-body::-webkit-scrollbar-thumb { background: #D1D5DB; border-radius: 3px; }
    </style>

    <!-- 배경 오버레이 -->
    <div class="absolute inset-0 bg-black bg-opacity-40" onclick="window.closeOrderModal()"></div>

    <!-- 모달 컨테이너 -->
    <div id="order-modal-content"
         style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
                width:720px;max-width:95vw;max-height:90vh;
                background:#fff;border-radius:10px;border:1px solid #E5E7EB;
                display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,0.15);overflow:hidden;">

        <!-- 헤더 -->
        <div style="display:flex;align-items:center;justify-content:space-between;
                    padding:14px 20px;border-bottom:1px solid #E5E7EB;
                    background:#fff;flex-shrink:0;">
            <span id="modal-title" style="font-size:15px;font-weight:600;color:#111827;">새 주문 등록</span>
            <button id="back-to-orders" onclick="window.closeOrderModal()"
                    style="width:28px;height:28px;display:flex;align-items:center;justify-content:center;
                           border-radius:6px;border:none;background:transparent;cursor:pointer;
                           color:#9CA3AF;font-size:14px;transition:all 0.15s;"
                    onmouseover="this.style.background='#F3F4F6';this.style.color='#374151'"
                    onmouseout="this.style.background='transparent';this.style.color='#9CA3AF'">
                <i class="fas fa-times"></i>
            </button>
        </div>

        <!-- 폼 본문 -->
        <div id="order-panel-body" style="flex:1;overflow-y:auto;background:#f9fafb;">
            <form id="order-form"
                  onkeydown="if(event.key==='Enter'&&event.target.tagName!=='TEXTAREA'&&event.target.id!=='order-submit-btn'){event.preventDefault();}">
            </form>
        </div>
    </div>
</div>
