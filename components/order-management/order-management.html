<!-- Order management -->
<div id="orders-section" class="section-content">
    <div class="app-section-frame">
        <div class="app-section-header">
            <div class="app-section-heading">
                <div class="app-section-icon">
                    <i class="fas fa-shopping-cart text-sm"></i>
                </div>
                <div>
                    <div class="app-section-title">주문 관리</div>
                    <div class="app-section-subtitle">주문 흐름, 배송 준비, 일괄 작업을 한 화면에서 다룹니다</div>
                </div>
            </div>
            <div class="app-toolbar">
                <button id="bulk-export-logen-btn" class="btn-secondary hidden">
                    <i class="fas fa-file-excel"></i>로젠택배
                </button>
                <button id="generate-picking-list-btn" class="btn-secondary">
                    <i class="fas fa-clipboard-list"></i>피킹 리스트
                </button>
                <button id="generate-packaging-labels-btn" class="btn-secondary">
                    <i class="fas fa-tags"></i>포장 라벨
                </button>
                <button id="add-order-btn" class="btn-primary">
                    <i class="fas fa-plus"></i>새 주문 등록
                </button>
            </div>
        </div>

        <!-- 상태 필터 탭 -->
        <div class="shrink-0 px-0 py-2 border-b border-gray-100 bg-white">
            <nav class="flex flex-nowrap gap-1 overflow-x-auto" style="scrollbar-width:none;-ms-overflow-style:none;" id="status-tab-nav">
                <button id="status-work_todo" class="status-tab-btn active py-1.5 px-2 text-xs font-semibold text-gray-700 hover:bg-green-100 rounded transition-all" title="상품준비 + 배송준비">
                    처리할 주문 <span class="ml-0.5 bg-green-100 text-green-700 px-1 py-0.5 rounded text-[10px] font-semibold" id="count-work_todo">0</span>
                </button>
                <button id="status-all" class="status-tab-btn py-1.5 px-2 text-xs font-medium text-gray-600 hover:bg-gray-200 rounded transition-all">
                    <i class="fas fa-list mr-0.5"></i>전체 <span class="ml-0.5 bg-gray-200 text-gray-600 px-1 py-0.5 rounded text-[10px] font-semibold" id="count-all">0</span>
                </button>
                <button id="status-주문접수" class="status-tab-btn py-1.5 px-2 text-xs font-medium text-gray-600 hover:bg-yellow-200 rounded transition-all">주문접수 <span class="ml-0.5 bg-yellow-100 text-yellow-600 px-1 py-0.5 rounded text-[10px]" id="count-주문접수">0</span></button>
                <button id="status-고객안내" class="status-tab-btn py-1.5 px-2 text-xs font-medium text-gray-600 hover:bg-blue-200 rounded transition-all">고객안내 <span class="ml-0.5 bg-blue-100 text-blue-600 px-1 py-0.5 rounded text-[10px]" id="count-고객안내">0</span></button>
                <button id="status-입금대기" class="status-tab-btn py-1.5 px-2 text-xs font-medium text-gray-600 hover:bg-orange-200 rounded transition-all">입금대기 <span class="ml-0.5 bg-orange-100 text-orange-600 px-1 py-0.5 rounded text-[10px]" id="count-입금대기">0</span></button>
                <button id="status-입금확인" class="status-tab-btn py-1.5 px-2 text-xs font-medium text-gray-600 hover:bg-green-200 rounded transition-all">입금확인 <span class="ml-0.5 bg-green-100 text-green-600 px-1 py-0.5 rounded text-[10px]" id="count-입금확인">0</span></button>
                <button id="status-상품준비" class="status-tab-btn py-1.5 px-2 text-xs font-medium text-gray-600 hover:bg-purple-200 rounded transition-all">상품준비 <span class="ml-0.5 bg-purple-100 text-purple-600 px-1 py-0.5 rounded text-[10px]" id="count-상품준비">0</span></button>
                <button id="status-배송준비" class="status-tab-btn py-1.5 px-2 text-xs font-medium text-gray-600 hover:bg-indigo-200 rounded transition-all">배송준비 <span class="ml-0.5 bg-indigo-100 text-indigo-600 px-1 py-0.5 rounded text-[10px]" id="count-배송준비">0</span></button>
                <button id="status-배송중" class="status-tab-btn py-1.5 px-2 text-xs font-medium text-gray-600 hover:bg-cyan-200 rounded transition-all">배송중 <span class="ml-0.5 bg-cyan-100 text-cyan-600 px-1 py-0.5 rounded text-[10px]" id="count-배송중">0</span></button>
                <button id="status-배송완료" class="status-tab-btn py-1.5 px-2 text-xs font-medium text-gray-600 hover:bg-emerald-200 rounded transition-all">배송완료 <span class="ml-0.5 bg-emerald-100 text-emerald-600 px-1 py-0.5 rounded text-[10px]" id="count-배송완료">0</span></button>
                <button id="status-주문취소" class="status-tab-btn py-1.5 px-2 text-xs font-medium text-gray-600 hover:bg-gray-200 rounded transition-all">주문취소 <span class="ml-0.5 bg-gray-100 text-gray-600 px-1 py-0.5 rounded text-[10px]" id="count-주문취소">0</span></button>
                <button id="status-환불완료" class="status-tab-btn py-1.5 px-2 text-xs font-medium text-gray-600 hover:bg-red-200 rounded transition-all">환불완료 <span class="ml-0.5 bg-red-100 text-red-600 px-1 py-0.5 rounded text-[10px]" id="count-환불완료">0</span></button>
            </nav>
        </div>

        <!-- 날짜 필터 바 -->
        <div id="order-date-filter-bar" class="shrink-0 flex items-center gap-2 px-3 py-1.5 border-b border-gray-100 bg-white flex-wrap">
            <span class="text-[11px] font-medium text-gray-500 shrink-0">기간</span>
            <div class="flex items-center gap-1 flex-wrap">
                <button onclick="setOrderDateFilter('today')" id="date-btn-today" class="order-date-quick-btn px-2.5 py-1 text-[11px] rounded-md text-gray-600 border border-gray-200 hover:bg-gray-100 transition-all">오늘</button>
                <button onclick="setOrderDateFilter('week')" id="date-btn-week" class="order-date-quick-btn px-2.5 py-1 text-[11px] rounded-md text-gray-600 border border-gray-200 hover:bg-gray-100 transition-all">1주일</button>
                <button onclick="setOrderDateFilter('month')" id="date-btn-month" class="order-date-quick-btn px-2.5 py-1 text-[11px] rounded-md text-gray-600 border border-gray-200 hover:bg-gray-100 transition-all">한달</button>
                <button onclick="setOrderDateFilter('all')" id="date-btn-all" class="order-date-quick-btn active-date">전체</button>
                <span class="text-gray-200 text-xs">|</span>
                <button onclick="toggleOrderDatePicker()" id="date-btn-custom" class="order-date-quick-btn px-2.5 py-1 text-[11px] rounded-md text-gray-600 border border-gray-200 hover:bg-gray-100 transition-all">
                    <i class="fas fa-calendar-alt mr-0.5 text-[10px]"></i>기간설정
                </button>
            </div>
            <div id="order-date-picker-wrap" class="hidden flex items-center gap-1.5">
                <input type="date" id="order-date-from" class="border border-gray-300 rounded-md px-2 py-0.5 text-[11px] focus:ring-1 focus:ring-emerald-400 focus:border-emerald-400 outline-none">
                <span class="text-[11px] text-gray-400">~</span>
                <input type="date" id="order-date-to" class="border border-gray-300 rounded-md px-2 py-0.5 text-[11px] focus:ring-1 focus:ring-emerald-400 focus:border-emerald-400 outline-none">
                <button onclick="applyOrderDateRange()" class="btn-primary" style="padding:3px 10px;font-size:11px;">적용</button>
                <button onclick="setOrderDateFilter('all')" class="btn-secondary" style="padding:3px 8px;font-size:11px;">초기화</button>
            </div>
            <span id="order-date-label" class="text-[11px] text-emerald-600 font-medium ml-auto hidden"></span>
        </div>

        <!-- 송장번호 일괄입력 인라인 패널 -->
        <div id="tracking-import-panel" class="hidden border-b border-amber-200 bg-amber-50">
            <div class="px-4 py-3">
                <div class="flex items-center justify-between mb-2">
                    <div class="flex items-center gap-2">
                        <i class="fas fa-barcode text-amber-600 text-sm"></i>
                        <span class="text-sm font-semibold text-amber-800">송장번호 일괄입력</span>
                        <span class="text-xs text-amber-600">— 배송준비 상태 주문에 송장번호를 입력하세요</span>
                    </div>
                    <div class="flex items-center gap-2">
                        <button id="tracking-save-all-btn" class="btn-primary">
                            <i class="fas fa-save"></i>전체 저장
                        </button>
                        <button id="tracking-panel-close" class="text-amber-500 hover:text-amber-700 p-1 rounded">
                            <i class="fas fa-times text-sm"></i>
                        </button>
                    </div>
                </div>
                <div class="overflow-x-auto rounded-lg border border-gray-200 bg-white">
                    <table class="w-full text-xs">
                        <thead style="background:#f1f5f9;">
                            <tr>
                                <th class="px-2.5 py-2 text-left text-[11px] font-semibold text-gray-700 border-b border-gray-200 w-24">주문번호</th>
                                <th class="px-2.5 py-2 text-left text-[11px] font-semibold text-gray-700 border-b border-gray-200 w-24">고객명</th>
                                <th class="px-2.5 py-2 text-left text-[11px] font-semibold text-gray-700 border-b border-gray-200">상품요약</th>
                                <th class="px-2.5 py-2 text-left text-[11px] font-semibold text-gray-700 border-b border-gray-200 w-48">송장번호</th>
                                <th class="px-2.5 py-2 text-center text-[11px] font-semibold text-gray-700 border-b border-gray-200 w-16">저장</th>
                            </tr>
                        </thead>
                        <tbody id="tracking-input-rows" class="divide-y divide-gray-100">
                            <tr><td colspan="6" class="text-center py-6 text-gray-400"><i class="fas fa-spinner fa-spin mr-2"></i>로딩 중...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="bulk-action-bar" class="hidden px-3 py-2 bg-gray-50 border-b border-gray-200 flex items-center justify-between flex-wrap gap-2">
            <span class="text-xs font-semibold text-gray-600"><span id="bulk-selected-count">0</span>건 선택됨</span>
            <div class="flex flex-wrap gap-1.5">
                <button type="button" onclick="bulkSetStatus('상품준비')" class="btn-secondary">
                    <i class="fas fa-box"></i>상품준비
                </button>
                <button type="button" onclick="bulkSetStatus('배송준비')" class="btn-secondary">
                    <i class="fas fa-shipping-fast"></i>배송준비
                </button>
                <button type="button" onclick="bulkSetStatus('배송완료')" class="btn-primary">
                    <i class="fas fa-check-circle"></i>배송완료
                </button>
                <button type="button" onclick="clearSelectedOrders()" class="btn-secondary">
                    <i class="fas fa-times"></i>선택 해제
                </button>
            </div>
        </div>

        <div class="p-3 bg-[linear-gradient(180deg,rgba(248,250,247,0.45)_0%,rgba(255,255,255,0)_100%)]">
            <div class="overflow-x-auto rounded-[14px] border border-gray-200 bg-white">
                <table class="w-full table-auto order-list-compact">
                    <thead>
                        <tr class="bg-gray-50 border-b border-gray-200">
                            <th class="px-2 py-2 text-center text-[11px] font-semibold text-gray-600 w-10" title="전체 선택">
                                <input type="checkbox" id="select-all-orders" class="rounded text-green-600 focus:ring-green-500 focus:ring-1">
                            </th>
                            <th class="px-2 py-2 text-center text-[11px] font-semibold text-gray-600 w-12" title="D-Day">D</th>
                            <th class="px-2 py-2 text-left text-[11px] font-semibold text-gray-700 min-w-[80px]" onclick="orderDataManager.sortOrders('customer_name')" title="고객명 정렬">
                                <i class="fas fa-user text-gray-500 mr-0.5"></i>고객명
                            </th>
                            <th class="px-2 py-2 text-left text-[11px] font-semibold text-gray-700 flex-1 min-w-[140px]">상품 요약</th>
                            <th class="px-2 py-2 text-left text-[10px] text-gray-500 w-28">주문번호</th>
                            <th class="px-2 py-2 text-right text-[11px] font-semibold text-gray-700 w-20" onclick="orderDataManager.sortOrders('total_amount')" title="주문금액">
                                <i class="fas fa-won-sign text-gray-500 mr-0.5"></i>금액
                            </th>
                            <th class="px-2 py-2 text-left text-[11px] font-semibold text-gray-700 w-20">상태</th>
                            <th class="px-2 py-2 text-center text-[11px] font-semibold text-gray-700 w-16" title="출력 상태">출력</th>
                            <th class="px-2 py-2 text-center text-[11px] font-semibold text-gray-700 w-16" title="SMS 상태">SMS</th>
                            <th class="px-2 py-2 text-center text-[11px] font-semibold text-gray-700 w-14">관리</th>
                        </tr>
                    </thead>
                    <tbody id="orders-table-body" class="divide-y divide-gray-100 text-xs">
                        <!-- dynamic -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <style>
        .status-tab-btn { transition: background-color .15s, color .15s; white-space: nowrap; flex-shrink: 0; }
        #status-tab-nav::-webkit-scrollbar { display: none; }
        .status-tab-btn.active.work-summary-tab { color: #fff !important; }
        #status-work_todo.active { background-color: rgb(34 197 94) !important; }
        #status-work_deposit.active { background-color: rgb(245 158 11) !important; }
        #status-work_ship_today.active { background-color: rgb(99 102 241) !important; }
        #status-work_done.active { background-color: rgb(16 185 129) !important; }
        .status-tab-btn:not(.work-summary-tab).active { background-color: #e5e7eb !important; color: #111 !important; }
        .order-list-compact tbody tr { border-bottom: 1px solid #f3f4f6; }
        .order-list-compact tbody tr:hover { background-color: #f9fafb; }
    </style>
</div>
