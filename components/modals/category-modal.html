<!-- 카테고리 관리 모달 -->
<div id="category-modal" class="modal-overlay" style="display:none;">
    <div class="modal-container modal-md">

        <!-- 헤더 -->
        <div class="modal-header">
            <span class="modal-title"><i class="fas fa-tags mr-2"></i>카테고리 관리</span>
            <button id="close-category-modal" onclick="window.closeCategoryModal()" class="modal-close-btn" title="닫기">
                <i class="fas fa-times"></i>
            </button>
        </div>

        <!-- 바디 -->
        <div class="modal-body" style="padding:12px 16px;">
            <div class="overflow-x-auto">
                <table class="w-full table-ui">
                    <thead>
                        <tr>
                            <th style="width:40px;">#</th>
                            <th>카테고리명</th>
                            <th style="width:70px;">관리</th>
                        </tr>
                    </thead>
                    <tbody id="categories-list">
                        <!-- 동적 렌더링 -->
                    </tbody>
                    <tfoot>
                        <tr>
                            <td class="text-center text-muted">+</td>
                            <td>
                                <input type="text" id="new-category-name" placeholder="새 카테고리명 입력 후 Enter"
                                       class="input-ui" style="height:26px;font-size:12px;"
                                       onkeydown="if(event.key==='Enter'){document.getElementById('add-category-btn').click();}">
                                <input type="hidden" id="new-category-color" value="green">
                                <input type="hidden" id="new-category-description" value="">
                            </td>
                            <td class="text-center">
                                <button id="add-category-btn" class="btn-primary" style="padding:3px 10px;font-size:11px;">추가</button>
                            </td>
                        </tr>
                    </tfoot>
                </table>
            </div>
        </div>

        <!-- 푸터 -->
        <div class="modal-footer">
            <button onclick="window.closeCategoryModal()" class="btn-secondary">닫기</button>
        </div>

    </div>
</div>
