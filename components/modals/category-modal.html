<!-- 카테고리 관리 모달 -->
<div id="category-modal" class="modal-overlay" style="display:none;">
    <div class="modal-container modal-md">

        <!-- 헤더 -->
        <div class="modal-header">
            <span class="modal-title"><i class="fas fa-tags mr-2"></i>카테고리 관리</span>
            <button id="close-category-modal" onclick="window.closeCategoryModal()" class="modal-close-btn" title="닫기">
                <i class="fas fa-times"></i>
            </button>
        </div>

        <!-- 바디 -->
        <div class="modal-body" style="padding:12px 16px;">
            <!-- 빠른 추가 -->
            <div class="flex gap-2 mb-3">
                <input type="text" id="new-category-name" placeholder="새 카테고리명 (예: 하워시아)"
                       class="input-ui" style="flex:1;" onkeydown="if(event.key==='Enter'){document.getElementById('add-category-btn').click();}">
                <input type="hidden" id="new-category-color" value="green">
                <input type="hidden" id="new-category-description" value="">
                <button id="add-category-btn" class="btn-primary" style="white-space:nowrap;">
                    <i class="fas fa-plus mr-1"></i>추가
                </button>
            </div>

            <!-- 카테고리 목록 -->
            <div id="categories-list" class="space-y-1">
                <!-- 동적 렌더링 -->
            </div>
        </div>

        <!-- 푸터 -->
        <div class="modal-footer">
            <button onclick="window.closeCategoryModal()" class="btn-secondary">닫기</button>
        </div>

    </div>
</div>
