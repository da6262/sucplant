<!-- 대기자 등록/수정 모달 -->
<div id="waitlist-modal" class="modal-overlay" style="display:none;">
    <div class="modal-container modal-md">

        <!-- 헤더 -->
        <div class="modal-header">
            <span id="waitlist-modal-title" class="modal-title">새 대기자 등록</span>
            <button id="close-waitlist-modal" class="modal-close-btn" title="닫기">
                <i class="fas fa-times"></i>
            </button>
        </div>

        <!-- 바디 -->
        <div class="modal-body">
            <form id="waitlist-form" class="form-grid">

                <!-- 고객명 (col-6) | 연락처 (col-6) -->
                <div class="form-col-6">
                    <label class="form-label">고객명 <span class="req">*</span></label>
                    <div style="position:relative;">
                        <input type="text" id="waitlist-customer-name"
                               placeholder="고객명을 입력하세요 (자동완성 지원)" required
                               class="form-control" autocomplete="off">
                        <div id="waitlist-customer-suggestions"
                             class="absolute top-full left-0 right-0 bg-white border border-gray-200 rounded-lg shadow-lg z-50 max-h-48 overflow-y-auto hidden"
                             style="top:100%;left:0;"></div>
                    </div>
                </div>

                <div class="form-col-6">
                    <label class="form-label">연락처 <span class="req">*</span></label>
                    <input type="tel" id="waitlist-customer-phone"
                           placeholder="010-1234-5678" required
                           class="form-control">
                    <p class="form-helper">고객명 입력 시 자동으로 채워집니다</p>
                </div>

                <!-- 상품 정보 그룹 -->
                <div class="form-section">
                    <div class="form-section-title">상품 정보</div>
                    <div class="form-section-inner">

                        <!-- 원하는 상품 (col-6) | 카테고리 (col-6) -->
                        <div class="form-col-6">
                            <label class="form-label">원하는 상품 <span class="req">*</span></label>
                            <input type="text" id="waitlist-form-product"
                                   placeholder="예: White Platter 대형" required
                                   class="form-control">
                        </div>
                        <div class="form-col-6">
                            <label class="form-label">카테고리</label>
                            <select id="waitlist-form-category" class="form-control">
                                <option value="">카테고리 선택</option>
                            </select>
                        </div>

                        <!-- 예상 판매가 (col-6) | 우선순위 (col-6) -->
                        <div class="form-col-6">
                            <label class="form-label">예상 판매가</label>
                            <div class="form-input-group with-unit">
                                <input type="number" id="waitlist-form-price"
                                       placeholder="0" min="0" step="1000"
                                       class="form-control">
                                <span class="form-input-unit">원</span>
                            </div>
                        </div>
                        <div class="form-col-6">
                            <label class="form-label">우선순위</label>
                            <select id="waitlist-form-priority" class="form-control">
                                <option value="3">보통</option>
                                <option value="5">높음</option>
                                <option value="4">중요</option>
                                <option value="2">낮음</option>
                                <option value="1">대기</option>
                            </select>
                        </div>

                    </div>
                </div>

                <!-- 메모 (col-12) -->
                <div class="form-col-12">
                    <label class="form-label">메모</label>
                    <textarea id="waitlist-form-memo" rows="3"
                              placeholder="고객 요구사항, 특이사항 등을 기록하세요"
                              class="form-control"></textarea>
                </div>

                <!-- 도움말 (col-12) -->
                <div class="form-col-12">
                    <div style="background:#FFF7ED;border:1px solid #FED7AA;border-radius:8px;padding:12px 14px;">
                        <p style="font-size:11px;font-weight:600;color:#C2410C;margin-bottom:6px;">
                            <i class="fas fa-lightbulb mr-1"></i>대기자 관리 팁
                        </p>
                        <ul style="font-size:11px;color:#EA580C;line-height:1.8;margin:0;padding:0;list-style:none;">
                            <li>• <strong>우선순위</strong>: 높음 &gt; 중요 &gt; 보통 &gt; 낮음 &gt; 대기 순으로 연락</li>
                            <li>• <strong>상품 입고 시</strong>: 해당 상품 대기자들에게 일괄 연락 가능</li>
                            <li>• <strong>주문 전환</strong>: 연락 후 주문하시면 자동으로 상태 변경</li>
                        </ul>
                    </div>
                </div>

            </form>
        </div>

        <!-- 푸터 -->
        <div class="modal-footer">
            <button type="button" onclick="waitlistUI.closeWaitlistModal()" class="btn-secondary">
                <i class="fas fa-times"></i>취소
            </button>
            <button type="button" onclick="waitlistUI.saveWaitlist()" class="btn-primary">
                <i class="fas fa-save"></i>저장
            </button>
        </div>

    </div>
</div>
