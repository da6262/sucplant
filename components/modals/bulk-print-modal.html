<!-- 대량 QR코드 프린트 모달 -->
<div id="bulk-print-modal" class="modal-overlay hidden">
    <div class="modal-container modal-xl">

        <!-- 헤더 -->
        <div class="modal-header">
            <span class="modal-title">
                <i class="fas fa-print mr-2 text-purple-600"></i>대량 QR코드 프린트
            </span>
            <button id="close-bulk-print-modal" class="modal-close-btn">
                <i class="fas fa-times"></i>
            </button>
        </div>

        <!-- 본문 -->
        <div class="modal-body">
            <p class="text-body mb-4">🏷️ 프린트할 상품을 선택하고 각각의 수량을 입력하세요.</p>

            <!-- 전체 선택/해제 -->
            <div class="flex items-center justify-between mb-4 p-3 bg-section rounded-lg">
                <label class="flex items-center">
                    <input type="checkbox" id="select-all-products" class="mr-2">
                    <span class="font-medium text-body">전체 선택</span>
                </label>
                <div class="text-sm text-body">
                    선택된 상품: <span id="selected-count">0</span>개 |
                    총 라벨 수: <span id="total-labels">0</span>장
                </div>
            </div>

            <!-- 상품 목록 -->
            <div id="bulk-print-products" class="space-y-3 max-h-96 overflow-y-auto border border-gray-200 rounded-lg p-4 mb-4">
                <!-- 상품 목록이 여기에 동적으로 생성됩니다 -->
            </div>

            <!-- 라벨 설정 -->
            <div class="p-4 bg-info rounded-lg">
                <h3 class="font-medium text-blue-800 mb-3">
                    <i class="fas fa-cog mr-2"></i>라벨 설정
                </h3>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-body mb-1">페이지당 열 수</label>
                        <select id="labels-per-row" class="input-ui">
                            <option value="8">8열</option>
                            <option value="10" selected>10열</option>
                            <option value="12">12열</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-body mb-1">용지 크기</label>
                        <select id="paper-size" class="input-ui">
                            <option value="a4" selected>A4</option>
                            <option value="letter">Letter</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>

        <!-- 푸터 -->
        <div class="modal-footer">
            <button id="close-bulk-print-modal-btn" class="btn-secondary">닫기</button>
            <button id="preview-bulk-print" class="btn-secondary">
                <i class="fas fa-eye mr-1"></i>미리보기
            </button>
            <button id="start-bulk-print" class="btn-primary">
                <i class="fas fa-print mr-1"></i>프린트 시작
            </button>
        </div>

    </div>
</div>
