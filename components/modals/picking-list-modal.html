<!-- 피킹 리스트 모달 -->
<style>
.picking-tab { color: var(--text-muted); cursor: pointer; transition: all 0.15s; }
.picking-tab:hover { color: var(--text-body); }
.picking-tab.active { color: var(--primary); border-bottom-color: var(--primary) !important; }
</style>
<div id="picking-list-modal" class="modal-overlay hidden">
    <div class="modal-container" style="max-width:1000px;">

        <!-- 헤더 -->
        <div class="modal-header">
            <span class="modal-title">
                <i class="fas fa-clipboard-list mr-2"></i>피킹 리스트
                <span class="text-xs font-normal text-muted ml-2" id="picking-summary-badge"></span>
            </span>
            <button id="close-picking-list-modal" class="modal-close-btn"><i class="fas fa-times"></i></button>
        </div>

        <!-- 탭 전환 -->
        <div class="flex border-b border-gray-200 px-4 pt-2 gap-1">
            <button class="picking-tab active px-3 py-1.5 text-xs font-medium border-b-2 border-transparent" data-tab="product">
                <i class="fas fa-box mr-1"></i>상품별 피킹
            </button>
            <button class="picking-tab px-3 py-1.5 text-xs font-medium border-b-2 border-transparent" data-tab="customer">
                <i class="fas fa-user mr-1"></i>고객별 포장
            </button>
        </div>

        <!-- 본문 -->
        <div class="modal-body" style="max-height:65vh;overflow-y:auto;padding:12px 16px;">
            <!-- 상품별 피킹 탭 -->
            <div id="picking-tab-product" class="picking-tab-content">
                <table class="w-full table-ui">
                    <thead>
                        <tr>
                            <th class="w-10">#</th>
                            <th>상품명</th>
                            <th class="w-16">사이즈</th>
                            <th class="w-16">수량</th>
                            <th class="w-16">건수</th>
                            <th class="w-20">금액</th>
                            <th class="w-10">✓</th>
                        </tr>
                    </thead>
                    <tbody id="picking-product-list"></tbody>
                </table>
            </div>

            <!-- 고객별 포장 탭 -->
            <div id="picking-tab-customer" class="picking-tab-content hidden">
                <div id="picking-customer-list"></div>
            </div>
        </div>

        <!-- 푸터 -->
        <div class="modal-footer">
            <button id="close-picking-list-modal-btn" class="btn-secondary">닫기</button>
            <button id="print-picking-list" class="btn-primary">
                <i class="fas fa-print mr-1"></i>인쇄
            </button>
        </div>

    </div>
</div>
