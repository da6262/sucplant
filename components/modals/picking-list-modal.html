<!-- 피킹 리스트 모달 -->
<div id="picking-list-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden z-50">
    <div class="flex items-center justify-center min-h-screen p-2">
        <div class="bg-white rounded-lg max-w-7xl w-full max-h-screen overflow-auto">
            <div class="p-4">
                <!-- 헤더 -->
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-lg font-bold text-heading">
                        <i class="fas fa-clipboard-list mr-2 text-purple-600"></i>피킹 리스트
                    </h3>
                    <button id="close-picking-list-modal" class="text-muted hover:text-body">
                        <i class="fas fa-times text-xl"></i>
                    </button>
                </div>
                
                <!-- 요약 정보 -->
                <div class="mb-4 p-3 bg-purple-50 rounded-lg">
                    <div class="grid grid-cols-3 gap-4 text-sm">
                        <div>총 주문: <span id="picking-total-orders" class="font-bold text-purple-600">0</span>건</div>
                        <div>총 상품: <span id="picking-total-items" class="font-bold text-purple-600">0</span>개</div>
                        <div>예상 작업시간: <span id="picking-estimated-time" class="font-bold text-purple-600">0</span>분</div>
                    </div>
                </div>
                
                <!-- 상품별 피킹 테이블 -->
                <div class="mb-4">
                    <h4 class="text-sm font-semibold mb-2 text-heading">상품별 피킹 리스트</h4>
                    <div class="overflow-x-auto">
                        <table class="w-full table-ui border border-gray-300 table-fixed">
                            <thead class="bg-page">
                                <tr>
                                    <th class="border border-gray-300 px-2 text-center w-12">순번</th>
                                    <th class="border border-gray-300 px-2 text-left w-1/3">상품명</th>
                                    <th class="border border-gray-300 px-2 text-center w-20">사이즈</th>
                                    <th class="border border-gray-300 px-2 text-center w-20">총 수량</th>
                                    <th class="border border-gray-300 px-2 text-center w-20">주문 건수</th>
                                    <th class="border border-gray-300 px-2 text-right w-24">총 금액</th>
                                </tr>
                            </thead>
                            <tbody id="picking-product-list">
                                <!-- 상품별 정리된 리스트가 여기에 표시됩니다 -->
                            </tbody>
                        </table>
                    </div>
                </div>
                
                <!-- 고객별 포장 테이블 -->
                <div class="mb-4">
                    <h4 class="text-sm font-semibold mb-2 text-heading">고객별 포장 리스트</h4>
                    <div class="overflow-x-auto">
                        <table class="w-full table-ui border border-gray-300 table-fixed">
                            <thead class="bg-page">
                                <tr>
                                    <th class="border border-gray-300 px-2 text-left w-24">고객명</th>
                                    <th class="border border-gray-300 px-2 text-left w-32">전화번호</th>
                                    <th class="border border-gray-300 px-2 text-center w-16">주문 수</th>
                                    <th class="border border-gray-300 px-2 text-right w-20">총 금액</th>
                                    <th class="border border-gray-300 px-2 text-left">상품 목록</th>
                                </tr>
                            </thead>
                            <tbody id="picking-customer-list">
                                <!-- 고객별 포장 정보가 여기에 표시됩니다 -->
                            </tbody>
                        </table>
                    </div>
                </div>
                
                <!-- 하단 버튼 -->
                <div class="flex justify-between items-center mt-6 pt-4 border-t border-gray-200">
                    <div class="flex space-x-2">
                        <button id="preview-picking-only" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded text-sm">
                            <i class="fas fa-box mr-1"></i>상품별 미리보기
                        </button>
                        <button id="preview-picking-list" class="btn-primary">
                            <i class="fas fa-list mr-1"></i>전체 미리보기
                        </button>
                        <button id="preview-packaging-only" class="bg-purple-600 hover:bg-purple-700 text-white px-4 py-2 rounded text-sm">
                            <i class="fas fa-user mr-1"></i>고객별 미리보기
                        </button>
                    </div>
                    <button id="close-picking-list-modal-btn" class="bg-gray-500 hover:bg-gray-600 text-white px-4 py-2 rounded text-sm">
                        닫기
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
