<!-- 주문 상세 내역 모달 -->
<div id="order-detail-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden z-50" style="z-index:300">
    <div class="flex items-center justify-center min-h-screen p-4">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-md max-h-[90vh] flex flex-col">

            <!-- 헤더 -->
            <div class="flex items-center justify-between px-4 py-3 border-b border-gray-100">
                <div class="flex items-center gap-2">
                    <i class="fas fa-receipt text-blue-500 text-sm"></i>
                    <span class="font-semibold text-gray-800 text-sm">주문 상세</span>
                    <span id="detail-order-status" class="px-1.5 py-0.5 rounded text-[10px] font-semibold bg-gray-100 text-gray-700"></span>
                </div>
                <button id="close-order-detail-modal" class="text-gray-400 hover:text-gray-600 p-1">
                    <i class="fas fa-times text-sm"></i>
                </button>
            </div>

            <!-- 본문 (스크롤) -->
            <div class="overflow-y-auto flex-1 px-4 py-3 space-y-3">

                <!-- 주문 + 고객 기본 정보 -->
                <div class="grid grid-cols-2 gap-x-4 gap-y-1.5 text-xs text-gray-700">
                    <div class="flex gap-1"><span class="text-gray-400 shrink-0">주문번호</span><span id="detail-order-number" class="font-medium truncate">-</span></div>
                    <div class="flex gap-1"><span class="text-gray-400 shrink-0">주문일</span><span id="detail-order-date" class="font-medium">-</span></div>
                    <div class="flex gap-1"><span class="text-gray-400 shrink-0">채널</span><span id="detail-order-channel" class="font-medium">-</span></div>
                    <div class="flex gap-1"><span class="text-gray-400 shrink-0">고객명</span><span id="detail-customer-name" class="font-medium">-</span></div>
                    <div class="flex gap-1"><span class="text-gray-400 shrink-0">연락처</span><span id="detail-customer-phone" class="font-medium">-</span></div>
                    <div class="col-span-2 flex gap-1"><span class="text-gray-400 shrink-0">배송지</span><span id="detail-customer-address" class="font-medium break-all">-</span></div>
                </div>

                <hr class="border-gray-100">

                <!-- 주문 상품 -->
                <div>
                    <p class="text-[11px] font-semibold text-gray-500 uppercase mb-1.5">주문 상품</p>
                    <table class="w-full text-xs">
                        <thead>
                            <tr class="text-gray-400 border-b border-gray-100">
                                <th class="text-left pb-1 font-medium">상품명</th>
                                <th class="text-center pb-1 font-medium w-10">수량</th>
                                <th class="text-right pb-1 font-medium w-16">단가</th>
                                <th class="text-right pb-1 font-medium w-16">금액</th>
                            </tr>
                        </thead>
                        <tbody id="detail-order-items" class="divide-y divide-gray-50 text-gray-700">
                        </tbody>
                    </table>
                </div>

                <hr class="border-gray-100">

                <!-- 금액 요약 -->
                <div class="text-xs space-y-1">
                    <div class="flex justify-between text-gray-500">
                        <span>상품금액</span><span id="detail-product-amount">0원</span>
                    </div>
                    <div class="flex justify-between text-gray-500">
                        <span>배송비</span><span id="detail-shipping-fee">0원</span>
                    </div>
                    <div class="flex justify-between text-red-500">
                        <span>할인</span><span id="detail-discount-amount">-0원</span>
                    </div>
                    <div class="flex justify-between font-bold text-sm pt-1 border-t border-gray-200">
                        <span>총 결제금액</span><span id="detail-total-amount" class="text-blue-600">0원</span>
                    </div>
                </div>

                <!-- 배송 + 메모 (값 있을 때만 표시) -->
                <div class="text-xs space-y-1 text-gray-700">
                    <div class="flex gap-1"><span class="text-gray-400 shrink-0">송장번호</span><span id="detail-tracking-number" class="font-medium">-</span></div>
                    <div class="flex gap-1"><span class="text-gray-400 shrink-0">배송상태</span><span id="detail-shipping-status" class="font-medium">-</span></div>
                    <div class="flex gap-1"><span class="text-gray-400 shrink-0">메모</span><span id="detail-order-memo" class="font-medium break-all">-</span></div>
                </div>

            </div>

            <!-- 하단 버튼 -->
            <div class="flex justify-end gap-2 px-4 py-3 border-t border-gray-100">
                <button id="edit-order-btn" class="text-xs px-3 py-1.5 rounded-lg bg-blue-50 text-blue-600 hover:bg-blue-100 font-medium">
                    <i class="fas fa-edit mr-1"></i>수정
                </button>
                <button id="print-order-btn" class="text-xs px-3 py-1.5 rounded-lg bg-green-50 text-green-600 hover:bg-green-100 font-medium">
                    <i class="fas fa-print mr-1"></i>출력
                </button>
                <button id="close-order-detail-modal-btn" class="text-xs px-3 py-1.5 rounded-lg bg-gray-100 text-gray-600 hover:bg-gray-200 font-medium">
                    닫기
                </button>
            </div>

        </div>
    </div>
</div>
