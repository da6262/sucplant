<!-- Customer management -->
<div id="customers-section" class="section-content">
    <div class="app-section-frame customer-shell flex flex-col h-[calc(100vh-3.5rem)] min-h-0">
        <div class="app-section-header shrink-0">
            <div class="app-section-heading">
                <div class="app-section-icon">
                    <i class="fas fa-users text-sm"></i>
                </div>
                <div>
                    <div class="app-section-title">고객 관리</div>
                    <div class="app-section-subtitle">검색, 응대, 주문 연결을 빠르게 처리하는 작업 화면</div>
                </div>
            </div>
            <div class="app-toolbar">
                <button id="manage-customer-grades-btn" class="app-btn app-btn-muted" title="환경설정에서 등급 관리">
                    <i class="fas fa-crown"></i> 등급 관리
                </button>
                <button id="add-customer-btn" class="app-btn app-btn-primary">
                    <i class="fas fa-user-plus"></i> 고객 등록
                </button>
            </div>
        </div>

        <div class="customer-admin-layout">
            <aside class="customer-admin-sidebar flex flex-col min-h-0">
                <div class="shrink-0 px-2 py-1.5 border-b border-[#dde6d9] bg-white/86">
                    <!-- 1행: 검색 + 정렬 + 초기화 -->
                    <div class="flex items-center gap-1.5 mb-1.5">
                        <div class="customer-search-wrap flex-1">
                            <input type="text" id="customer-search" placeholder="고객명, 전화번호 검색" class="w-full py-1.5 pl-8 pr-7 text-xs" autocomplete="off">
                            <i class="fas fa-search absolute left-2.5 top-1/2 -translate-y-1/2 text-gray-400" style="font-size:10px;"></i>
                            <div id="customer-search-suggestions" class="absolute left-0 right-0 top-full mt-2 bg-white border border-[#dde6d9] rounded-2xl shadow-xl z-20 max-h-52 overflow-y-auto hidden"></div>
                        </div>
                        <select id="customer-sort" class="customer-filter-select shrink-0 py-1.5 px-2 text-xs w-[76px]">
                            <option value="newest">최신순</option>
                            <option value="name_asc">이름↑</option>
                            <option value="name_desc">이름↓</option>
                            <option value="grade_high">등급순</option>
                        </select>
                        <button id="reset-customer-search" class="shrink-0 app-btn app-btn-muted !min-h-0 !py-1.5 !px-2 text-xs" title="초기화">
                            <i class="fas fa-rotate-left" style="font-size:10px;"></i>
                        </button>
                    </div>
                    <!-- 2행: 등급 필터 + 체크박스 -->
                    <div class="flex items-center gap-1 flex-nowrap overflow-x-auto" style="scrollbar-width:none;">
                        <button id="customer-grade-all" class="customer-tab-btn customer-chip active"><span>전체</span><span id="customer-count-all">0</span></button>
                        <button id="customer-grade-BLACK_DIAMOND" class="customer-tab-btn customer-chip"><span>블랙</span><span id="customer-count-BLACK_DIAMOND">0</span></button>
                        <button id="customer-grade-PURPLE_EMPEROR" class="customer-tab-btn customer-chip"><span>퍼플</span><span id="customer-count-PURPLE_EMPEROR">0</span></button>
                        <button id="customer-grade-RED_RUBY" class="customer-tab-btn customer-chip"><span>레드</span><span id="customer-count-RED_RUBY">0</span></button>
                        <button id="customer-grade-GREEN_LEAF" class="customer-tab-btn customer-chip"><span>그린</span><span id="customer-count-GREEN_LEAF">0</span></button>
                        <button id="customer-grade-GENERAL" class="customer-tab-btn customer-chip"><span>일반</span><span id="customer-count-GENERAL">0</span></button>
                        <div class="w-px h-3 bg-gray-200 mx-1 shrink-0"></div>
                        <label class="shrink-0 inline-flex items-center gap-1 cursor-pointer text-[11px] text-gray-500 whitespace-nowrap">
                            <input type="checkbox" id="filter-unpaid" class="rounded border-gray-300 text-emerald-600 focus:ring-emerald-500">미납
                        </label>
                        <label class="shrink-0 inline-flex items-center gap-1 cursor-pointer text-[11px] text-gray-500 whitespace-nowrap">
                            <input type="checkbox" id="filter-waitlist" class="rounded border-gray-300 text-emerald-600 focus:ring-emerald-500">대기
                        </label>
                    </div>
                </div>

                <!-- 일괄처리 바 (체크 시에만 표시) -->
                <div id="customer-bulk-bar" class="hidden px-3 py-2 bg-emerald-50 border-b border-emerald-200 flex items-center gap-2 flex-shrink-0">
                    <span class="text-xs font-medium text-emerald-700"><span id="customer-bulk-count">0</span>명 선택됨</span>
                    <button onclick="bulkSendSMS()" class="px-2 py-1 text-xs bg-emerald-600 text-white rounded hover:bg-emerald-700">SMS 발송</button>
                    <button onclick="clearCustomerSelection()" class="px-2 py-1 text-xs bg-white border border-gray-300 text-gray-600 rounded hover:bg-gray-50 ml-auto">선택 해제</button>
                </div>

                <div class="flex-1 overflow-auto px-2 py-1">
                    <div id="customer-list-container" class="pb-1">
                        <!-- dynamic -->
                    </div>
                </div>

                <!-- 페이지네이션 -->
                <div id="customer-pagination" class="flex items-center justify-center gap-1 px-2 py-1.5 border-t border-gray-100 flex-shrink-0 flex-wrap bg-white">
                </div>
            </aside>

            <section class="customer-admin-main">
                <div id="customer-detail-content" class="flex-1 overflow-y-auto p-3 min-h-0">
                    <div id="customer-detail-placeholder" class="customer-work-card h-full min-h-[280px] flex flex-col items-center justify-center text-center text-gray-400 p-8">
                        <div class="w-14 h-14 rounded-2xl bg-[#eef4ef] flex items-center justify-center mb-4">
                            <i class="fas fa-user text-2xl"></i>
                        </div>
                        <p class="text-sm font-semibold text-gray-600">고객을 선택하면 상세 작업 패널이 열립니다</p>
                        <p class="text-xs text-gray-400 mt-2">주문 이력, 메모, 연락 액션을 한 화면에서 바로 처리하세요</p>
                    </div>
                </div>
            </section>
        </div>

        <footer id="customer-status-footer" class="shrink-0 px-3 py-1 border-t border-[#dde6d9] bg-white text-[11px] text-gray-500 flex items-center justify-between">
            <span>전체 <strong id="customer-status-total" class="text-gray-700">0</strong>명</span>
            <span>오늘 가입 <strong id="customer-status-today" class="text-emerald-600">0</strong>명</span>
        </footer>
    </div>
</div>

<div id="customer-grades-modal" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden">
    <div class="flex items-center justify-center min-h-screen p-4">
        <div class="bg-white rounded-lg shadow-xl w-full max-w-4xl max-h-[90vh] overflow-hidden">
            <div class="flex items-center justify-between p-6 border-b border-gray-200">
                <div class="flex items-center space-x-3">
                    <div class="w-10 h-10 bg-purple-100 rounded-lg flex items-center justify-center">
                        <i class="fas fa-crown text-purple-600"></i>
                    </div>
                    <div>
                        <h3 class="text-lg font-semibold text-gray-900">고객 등급 관리</h3>
                        <p class="text-sm text-gray-600">고객 등급 기준을 설정하고 관리합니다</p>
                    </div>
                </div>
                <button id="close-customer-grades-modal" class="text-gray-400 hover:text-gray-600 transition-colors">
                    <i class="fas fa-times text-xl"></i>
                </button>
            </div>
            <div class="p-6 overflow-y-auto max-h-[calc(90vh-140px)]">
                <div class="mb-6">
                    <div class="flex items-center justify-between mb-4">
                        <h4 class="text-md font-medium text-gray-900">고객 등급 목록</h4>
                        <button id="add-customer-grade-btn" class="app-btn app-btn-soft">
                            <i class="fas fa-plus mr-2"></i>등급 추가
                        </button>
                    </div>
                    <div id="customer-grades-list" class="space-y-3"></div>
                </div>
            </div>
            <div class="flex items-center justify-end space-x-3 p-6 border-t border-gray-200 bg-gray-50">
                <button id="cancel-customer-grades" class="app-btn app-btn-muted">취소</button>
                <button id="save-customer-grades" class="app-btn app-btn-primary">저장</button>
            </div>
        </div>
    </div>
</div>
