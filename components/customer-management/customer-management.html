<!-- 고객관리(CRM) 메인 컴포넌트 -->
<div id="customers-section" class="flex flex-col h-[calc(100vh-3.5rem)] min-h-0 bg-white">

    <!-- 헤더 -->
    <div class="page-header">
        <h2>고객 관리</h2>
        <div class="action-group">
            <button id="recalc-auto-tags-btn" class="btn-secondary" title="전체 고객 주문 이력으로 자동 태그(신규·단골·이탈위험·VIP후보) 재계산"><i class="fas fa-robot"></i>자동 태그</button>
            <button id="manage-customer-grades-btn" class="btn-secondary"><i class="fas fa-crown"></i>등급 관리</button>
            <button class="btn-secondary" title="내보내기"><i class="fas fa-download"></i></button>
            <button id="add-customer-btn" class="btn-primary"><i class="fas fa-user-plus"></i>고객 등록</button>
        </div>
    </div>

    <!-- 검색 + 필터 한 줄 -->
    <div class="filter-bar">
        <div class="relative">
            <input type="text" id="customer-search" placeholder="고객명·전화번호 검색"
                   class="input-ui" style="max-width:240px;padding-right:28px;" autocomplete="off"
                   oninput="if(window.handleCustomerSearch) handleCustomerSearch(this.value);"
                   onchange="if(window.handleCustomerSearch) handleCustomerSearch(this.value);">
            <i class="fas fa-search absolute right-2 top-1/2 -translate-y-1/2 text-muted text-xs pointer-events-none"></i>
            <div id="customer-search-suggestions" class="absolute left-0 top-full mt-0.5 bg-white border border-gray-200 rounded shadow-lg z-20 max-h-40 overflow-y-auto hidden" style="min-width:200px;"></div>
        </div>
        <select id="customer-sort" class="input-ui" style="max-width:140px;">
            <option value="newest">최근등록순</option>
            <option value="name_asc">이름↑</option>
            <option value="name_desc">이름↓</option>
            <option value="grade_high">등급순</option>
        </select>
        <button id="apply-customer-sort" class="btn-search">적용</button>
        <button id="reset-customer-search" class="btn-secondary"><i class="fas fa-refresh"></i></button>
        <span class="text-gray-300">|</span>
        <span class="text-xs text-muted">등급:</span>
        <button id="customer-grade-all" class="customer-tab-btn px-2 py-0.5 rounded text-xs font-medium text-body hover:bg-success hover:text-emerald-700">전체 <span id="customer-count-all">0</span></button>
        <span id="customer-grade-dynamic-slot"><!-- 환경설정 customerGrades 기반 동적 생성 --></span>
        <span class="text-gray-300">|</span>
        <label class="inline-flex items-center gap-1 text-xs text-body cursor-pointer">
            <input type="checkbox" id="filter-unpaid" class="checkbox-ui"> 미납
        </label>
        <label class="inline-flex items-center gap-1 text-xs text-body cursor-pointer">
            <input type="checkbox" id="filter-waitlist" class="checkbox-ui"> 대기
        </label>
    </div>

    <!-- 고객 목록 -->
    <div class="flex-1 overflow-auto">
        <table class="table-ui min-w-full">
            <thead class="sticky top-0 z-10">
                <tr>
                    <th>고객명</th>
                    <th>전화번호</th>
                    <th>최근주문</th>
                    <th>등급</th>
                    <th>관리</th>
                </tr>
            </thead>
            <tbody id="customer-list-container">
                <!-- JS로 채워짐 -->
            </tbody>
        </table>
    </div>

    <!-- 하단 상태 바 -->
    <footer id="customer-status-footer" class="shrink-0 px-3 py-1 border-t border-gray-200 bg-section text-xs text-body flex items-center justify-between">
        <span>총 <strong id="customer-status-total">0</strong>명 · <span id="customer-list-count">0명 표시</span></span>
        <div class="flex items-center gap-2">
            <span>오늘 신규 <strong id="customer-status-today">0</strong>명</span>
            <span class="text-gray-300">|</span>
            <label class="flex items-center gap-1 text-muted">표시
                <select id="customer-page-size" class="select-page-size">
                    <option value="10">10명</option>
                    <option value="20" selected>20명</option>
                    <option value="50">50명</option>
                    <option value="0">전체</option>
                </select>
            </label>
        </div>
    </footer>

    <!-- 빠른 통화 로그 다이얼로그 (목록 행의 📞 버튼에서 호출) -->
    <div id="quick-call-log-modal" class="modal-overlay hidden" style="z-index:470;">
        <div class="modal-container" style="max-width:420px;width:92vw;">
            <div class="modal-header">
                <span class="modal-title">
                    <i class="fas fa-phone" style="color:var(--info);margin-right:6px;"></i>
                    <span id="quick-call-log-title">통화 기록</span>
                </span>
                <button id="quick-call-log-close" class="modal-close-btn" title="닫기"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body" style="display:flex;flex-direction:column;gap:8px;">
                <div id="quick-call-log-meta" class="text-muted text-xs"></div>
                <input type="text" id="quick-call-log-title-input" class="input-ui"
                       placeholder="한 줄 요약 (예: 배송 전 전화 요청)" maxlength="200">
                <textarea id="quick-call-log-body-input" class="input-ui"
                          placeholder="상세 내용 (선택) — Enter 로 저장, Shift+Enter 줄바꿈"
                          style="min-height:80px;resize:vertical;font-family:inherit;"></textarea>
                <div class="text-muted text-xs">※ Esc 취소 · 제목 칸에서 Enter 저장</div>
            </div>
            <div class="modal-footer">
                <button id="quick-call-log-cancel" class="btn-secondary">취소</button>
                <button id="quick-call-log-save" class="btn-primary"><i class="fas fa-save"></i> 저장</button>
            </div>
        </div>
    </div>

    <!-- 고객 상세 팝업 모달 (position:fixed → 뷰포트 중앙, #customers-section 안에 있어야 DOM 보존됨) -->
    <div id="customer-detail-panel" class="modal-overlay hidden" style="z-index:450;">
        <div class="modal-container" style="max-width:1040px;width:94vw;max-height:90vh;display:flex;flex-direction:column;">
            <div class="modal-header">
                <span id="crm-modal-title" class="modal-title">고객 상세</span>
                <button id="close-crm-panel" class="modal-close-btn" title="닫기"><i class="fas fa-times"></i></button>
            </div>
            <div id="customer-detail-content" class="modal-body" style="overflow-y:auto;flex:1;min-height:0;"></div>
        </div>
    </div>

    <!-- 고객등급 관리 모달 -->
    <div id="customer-grades-modal" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden">
    <div class="flex items-center justify-center min-h-screen p-4">
        <div class="bg-white rounded-lg shadow-xl w-full max-w-4xl max-h-[90vh] overflow-hidden">
            <div class="flex items-center justify-between p-4 border-b border-gray-200">
                <div class="flex items-center space-x-3">
                    <div class="w-8 h-8 bg-purple-accent rounded-lg flex items-center justify-center">
                        <i class="fas fa-crown text-purple-600 text-sm"></i>
                    </div>
                    <h3 class="text-sm font-semibold text-heading">고객등급 관리</h3>
                </div>
                <button id="close-customer-grades-modal" class="text-muted hover:text-body transition-colors">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="p-4 overflow-y-auto max-h-[calc(90vh-120px)]">
                <div class="mb-4">
                    <div class="flex items-center justify-between mb-3">
                        <h4 class="text-sm font-medium text-heading">고객등급 목록</h4>
                        <button id="add-customer-grade-btn" class="btn-primary text-xs"><i class="fas fa-plus"></i>등급 추가</button>
                    </div>
                    <div id="customer-grades-list" class="space-y-2"></div>
                </div>
            </div>
            <div class="flex items-center justify-end space-x-2 px-4 py-3 border-t border-gray-200 bg-section">
                <button id="cancel-customer-grades" class="btn-secondary">취소</button>
                <button id="save-customer-grades" class="btn-primary">저장</button>
            </div>
        </div>
    </div>

</div><!-- /#customers-section -->
