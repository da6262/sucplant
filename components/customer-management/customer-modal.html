<!-- 고객 등록/수정 모달 -->
<div id="customer-modal" class="modal-overlay" style="display:none;z-index:999999;">
    <div class="modal-container modal-sm" id="customer-modal-content">

        <!-- 헤더 -->
        <div class="modal-header">
            <span id="customer-modal-title" class="modal-title">새 고객 등록</span>
            <button onclick="window.closeCustomerModal()" class="modal-close-btn">
                <i class="fas fa-times"></i>
            </button>
        </div>

        <!-- 탭 네비게이션 (수정 모드에서만 표시) -->
        <div id="customer-modal-tabs" class="hidden" style="display:none;border-bottom:1px solid #e5e7eb;">
            <div style="display:flex;padding:0 16px;">
                <button type="button" id="customer-tab-info"
                        onclick="window.switchCustomerTab('info')"
                        style="padding:8px 14px;font-size:12px;font-weight:600;border:none;background:none;cursor:pointer;border-bottom:2px solid var(--primary);color:var(--primary);">
                    <i class="fas fa-user mr-1"></i>정보
                </button>
                <button type="button" id="customer-tab-orders"
                        onclick="window.switchCustomerTab('orders')"
                        style="padding:8px 14px;font-size:12px;font-weight:500;border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;color:var(--text-secondary);">
                    <i class="fas fa-shopping-bag mr-1"></i>주문이력
                </button>
            </div>
        </div>

        <!-- 폼 본문 -->
        <div class="modal-body overflow-y-auto" style="flex:1;">
            <form id="customer-form" class="form-grid">
                <input type="hidden" id="customer-id">

                <!-- 고객명 (col-6) | 전화번호 (col-6) -->
                <div class="form-col-6">
                    <label class="form-label">고객명 <span class="req">*</span></label>
                    <div style="position:relative;">
                        <input type="text" id="customer-form-name" placeholder="홍길동" required
                               oninput="window.handleCustomerNameInput(this.value)"
                               onblur="window.handleCustomerNameBlur()"
                               onfocus="window.handleCustomerNameFocus(this.value)"
                               onkeydown="if(event.key==='Enter' && !document.querySelector('#customer-name-autocomplete:not(.hidden) .autocomplete-item.bg-blue-50')){event.preventDefault();document.getElementById('customer-form-phone').focus();return;} if(window.handleCustomerNameKeydown)window.handleCustomerNameKeydown(event);"
                               class="form-control">
                        <div id="customer-name-autocomplete"
                             class="absolute z-50 w-full bg-white border border-gray-200 rounded-lg shadow-lg mt-0.5 hidden max-h-40 overflow-y-auto"
                             style="top:100%;left:0;"></div>
                    </div>
                </div>

                <div class="form-col-6">
                    <label class="form-label">전화번호 <span class="req">*</span></label>
                    <input type="tel" id="customer-form-phone" placeholder="010-1234-5678" required maxlength="13"
                           oninput="window.formatPhoneNumber(this); document.getElementById('phone-duplicate-message')?.classList.add('hidden');"
                           onblur="window.checkPhoneDuplicate(this.value)"
                           onkeydown="if(event.key==='Enter'){event.preventDefault();document.getElementById('customer-form-address').focus();}"
                           class="form-control">
                    <div id="phone-duplicate-message" class="form-error hidden"></div>
                </div>

                <!-- 주소 (col-12) - 클릭하면 Daum 검색 자동 오픈 -->
                <div class="form-col-12">
                    <label class="form-label">주소</label>
                    <input type="text" id="customer-form-address" readonly
                           placeholder="클릭하면 우편번호 검색이 열립니다"
                           autocomplete="off"
                           style="cursor:pointer;background:var(--bg-light);"
                           onclick="window.handleAddressInput && window.handleAddressInput(this.value || '')"
                           onkeydown="if(event.key==='Enter'){event.preventDefault();window.handleAddressInput && window.handleAddressInput(this.value || '');}"
                           class="form-control">
                    <div id="address-embed-container"
                         class="hidden mt-1 border border-gray-200 rounded-lg overflow-hidden shadow-md"
                         style="height:300px;"></div>
                </div>

                <!-- 상세주소 (col-12) -->
                <div class="form-col-12">
                    <label class="form-label">상세주소</label>
                    <input type="text" id="customer-form-address-detail" placeholder="동, 호수 등 (선택)"
                           onkeydown="if(event.key==='Enter'){event.preventDefault();document.getElementById('customer-save-btn')?.click();}"
                           class="form-control">
                </div>

                <!-- 추가 정보 토글 (col-12) — 신규 등록 시 기본 접힘, 수정 시에는 자동 펼침 -->
                <div class="form-col-12">
                    <button type="button" onclick="window.toggleCustomerExtraInfo()"
                            class="w-full flex items-center justify-between py-2 px-3 text-xs text-secondary hover:bg-section rounded-md mt-1"
                            style="border:1px dashed var(--border);">
                        <span><i class="fas fa-cog mr-1.5"></i>추가 정보 <span class="text-muted">(이메일 · 등급 · 메모) — 보통 비워두셔도 됩니다</span></span>
                        <i id="toggle-extra-info-icon" class="fas fa-chevron-down text-xs transition-transform duration-200"></i>
                    </button>
                </div>

                <!-- 추가 정보 (숨김 → 표시) -->
                <div id="extra-info-content" class="form-col-12 hidden">
                    <div class="form-section">
                        <div class="form-section-title">추가 정보</div>
                        <div class="form-section-inner">

                            <!-- 이메일 (col-12) -->
                            <div class="form-col-12">
                                <label class="form-label">이메일</label>
                                <input type="email" id="customer-form-email" placeholder="example@email.com"
                                       class="form-control">
                            </div>

                            <!-- 등록일 (col-6) | 등급 (col-6) -->
                            <div class="form-col-6">
                                <label class="form-label">등록일</label>
                                <div class="form-input-group">
                                    <input type="date" id="customer-form-registration-date" class="form-control">
                                    <button type="button" onclick="window.setCustomerRegistrationDateToday()"
                                            class="btn-secondary">오늘</button>
                                </div>
                            </div>

                            <div class="form-col-6">
                                <label class="form-label">등급</label>
                                <select id="customer-form-grade" class="form-control">
                                    <option value="GENERAL">일반</option>
                                </select>
                            </div>

                            <!-- 상태 (col-12) -->
                            <div class="form-col-12">
                                <label class="form-label">상태</label>
                                <div class="flex gap-2">
                                    <button type="button" data-status="ACTIVE"
                                            onclick="window.setCustomerStatus('ACTIVE')"
                                            class="customer-status-btn flex-1 py-2 rounded-lg text-xs font-medium border-2 border-green-500 bg-success text-green-700">활성</button>
                                    <button type="button" data-status="INACTIVE"
                                            onclick="window.setCustomerStatus('INACTIVE')"
                                            class="customer-status-btn flex-1 py-2 rounded-lg text-xs font-medium border-2 border-gray-200 bg-white text-muted">비활성</button>
                                    <button type="button" data-status="SUSPENDED"
                                            onclick="window.setCustomerStatus('SUSPENDED')"
                                            class="customer-status-btn flex-1 py-2 rounded-lg text-xs font-medium border-2 border-gray-200 bg-white text-muted">정지</button>
                                </div>
                                <input type="hidden" id="customer-form-status" value="ACTIVE">
                            </div>

                            <!-- 메모 (col-12) -->
                            <div class="form-col-12">
                                <label class="form-label">
                                    메모
                                    <span id="memo-char-count" class="text-muted font-normal ml-2">0 / 200</span>
                                </label>
                                <textarea id="customer-form-memo" rows="3"
                                          placeholder="특이사항, 선호도 등" maxlength="200"
                                          oninput="window.updateMemoCharCount(this.value)"
                                          class="form-control"></textarea>
                            </div>

                        </div>
                    </div>
                </div>

            </form>
        </div>

        <!-- 주문이력 탭 콘텐츠 -->
        <div id="customer-orders-tab-content" style="display:none;" class="overflow-y-auto" style="flex:1;">
            <div style="padding:12px;">
                <!-- 통계 4칸 -->
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;">
                    <div style="background:#f0fdf4;border-radius:var(--radius-lg);padding:10px;text-align:center;">
                        <div style="font-size:11px;color:var(--text-secondary);">총 구매액</div>
                        <div id="cmod-stat-total" style="font-size:15px;font-weight:700;color:var(--primary);">—</div>
                    </div>
                    <div style="background:#eff6ff;border-radius:var(--radius-lg);padding:10px;text-align:center;">
                        <div style="font-size:11px;color:var(--text-secondary);">구매 횟수</div>
                        <div id="cmod-stat-count" style="font-size:15px;font-weight:700;color:var(--info);">—</div>
                    </div>
                    <div style="background:#fffbeb;border-radius:var(--radius-lg);padding:10px;text-align:center;">
                        <div style="font-size:11px;color:var(--text-secondary);">평균 구매액</div>
                        <div id="cmod-stat-avg" style="font-size:15px;font-weight:700;color:var(--warn);">—</div>
                    </div>
                    <div style="background:#f9fafb;border-radius:var(--radius-lg);padding:10px;text-align:center;">
                        <div style="font-size:11px;color:var(--text-secondary);">마지막 구매</div>
                        <div id="cmod-stat-last" style="font-size:13px;font-weight:600;color:var(--text-body);">—</div>
                    </div>
                </div>
                <!-- 주문 목록 테이블 -->
                <div style="overflow:auto;max-height:320px;border:1px solid #e5e7eb;border-radius:var(--radius-md);">
                    <table class="table-ui" style="width:100%;min-width:360px;">
                        <thead>
                            <tr>
                                <th style="width:72px;">날짜</th>
                                <th>상품</th>
                                <th style="width:80px;">금액</th>
                                <th style="width:68px;">상태</th>
                            </tr>
                        </thead>
                        <tbody id="cmod-orders-tbody">
                            <tr><td colspan="4" class="text-center td-muted" style="padding:16px;">불러오는 중...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- 푸터 -->
        <div class="modal-footer" id="customer-modal-footer">
            <button type="button" onclick="window.closeCustomerModal()" class="btn-secondary">취소</button>
            <button type="button" id="customer-save-btn" class="btn-primary">
                <i class="fas fa-save mr-1"></i>저장
            </button>
        </div>

    </div>
</div>
