<!-- 고객 등록/수정 모달 -->
<div id="customer-modal" class="modal-overlay" style="display:none;z-index:999999;">
    <div class="modal-container modal-sm" id="customer-modal-content">

        <!-- 헤더 -->
        <div class="modal-header">
            <span id="customer-modal-title" class="modal-title">새 고객 등록</span>
            <button onclick="window.closeCustomerModal()" class="modal-close-btn">
                <i class="fas fa-times"></i>
            </button>
        </div>

        <!-- 폼 본문 -->
        <div class="modal-body overflow-y-auto" style="flex:1;">
            <form id="customer-form" class="form-grid">
                <input type="hidden" id="customer-id">

                <!-- 고객명 (col-6) | 전화번호 (col-6) -->
                <div class="form-col-6">
                    <label class="form-label">고객명 <span class="req">*</span></label>
                    <div style="position:relative;">
                        <input type="text" id="customer-form-name" placeholder="홍길동" required
                               oninput="window.handleCustomerNameInput(this.value)"
                               onblur="window.handleCustomerNameBlur()"
                               onfocus="window.handleCustomerNameFocus(this.value)"
                               onkeydown="window.handleCustomerNameKeydown(event)"
                               class="form-control">
                        <div id="customer-name-autocomplete"
                             class="absolute z-50 w-full bg-white border border-gray-200 rounded-lg shadow-lg mt-0.5 hidden max-h-40 overflow-y-auto"
                             style="top:100%;left:0;"></div>
                    </div>
                </div>

                <div class="form-col-6">
                    <label class="form-label">전화번호 <span class="req">*</span></label>
                    <input type="tel" id="customer-form-phone" placeholder="010-1234-5678" required maxlength="13"
                           oninput="window.formatPhoneNumber(this); window.checkPhoneDuplicate(this.value)"
                           onblur="window.checkPhoneDuplicate(this.value)"
                           class="form-control">
                    <div id="phone-duplicate-message" class="form-error hidden"></div>
                </div>

                <!-- 주소 (col-12) -->
                <div class="form-col-12">
                    <label class="form-label">주소</label>
                    <div class="form-input-group">
                        <input type="text" id="customer-form-address" placeholder="주소 검색" readonly
                               class="form-control">
                        <button type="button" id="customer-form-address-search"
                                onclick="window.openAddressSearch()" class="btn-secondary">
                            <i class="fas fa-search mr-1"></i>검색
                        </button>
                    </div>
                </div>

                <!-- 상세주소 (col-12) -->
                <div class="form-col-12">
                    <label class="form-label">상세주소</label>
                    <input type="text" id="customer-form-address-detail" placeholder="동, 호수 등"
                           class="form-control">
                    <p class="form-helper">건물명, 동·호수 등 상세 위치 (선택)</p>
                </div>

                <!-- 추가 정보 토글 (col-12) -->
                <div class="form-col-12">
                    <button type="button" onclick="window.toggleCustomerExtraInfo()"
                            class="w-full flex items-center justify-between py-1.5 text-xs text-gray-400 hover:text-gray-600 border-t border-gray-100 pt-3">
                        <span>추가 정보 <span class="text-gray-300">(이메일 · 등급 · 상태 · 메모)</span></span>
                        <i id="toggle-extra-info-icon" class="fas fa-chevron-down text-xs transition-transform duration-200"></i>
                    </button>
                </div>

                <!-- 추가 정보 (숨김 → 표시) -->
                <div id="extra-info-content" class="form-col-12 hidden">
                    <div class="form-section">
                        <div class="form-section-title">추가 정보</div>
                        <div class="form-section-inner">

                            <!-- 이메일 (col-12) -->
                            <div class="form-col-12">
                                <label class="form-label">이메일</label>
                                <input type="email" id="customer-form-email" placeholder="example@email.com"
                                       class="form-control">
                            </div>

                            <!-- 등록일 (col-6) | 등급 (col-6) -->
                            <div class="form-col-6">
                                <label class="form-label">등록일</label>
                                <div class="form-input-group">
                                    <input type="date" id="customer-form-registration-date" class="form-control">
                                    <button type="button" onclick="window.setCustomerRegistrationDateToday()"
                                            class="btn-secondary">오늘</button>
                                </div>
                            </div>

                            <div class="form-col-6">
                                <label class="form-label">등급</label>
                                <select id="customer-form-grade" class="form-control">
                                    <option value="GENERAL">일반</option>
                                </select>
                            </div>

                            <!-- 상태 (col-12) -->
                            <div class="form-col-12">
                                <label class="form-label">상태</label>
                                <div class="flex gap-2">
                                    <button type="button" data-status="ACTIVE"
                                            onclick="window.setCustomerStatus('ACTIVE')"
                                            class="customer-status-btn flex-1 py-2 rounded-lg text-xs font-medium border-2 border-green-500 bg-green-50 text-green-700">활성</button>
                                    <button type="button" data-status="INACTIVE"
                                            onclick="window.setCustomerStatus('INACTIVE')"
                                            class="customer-status-btn flex-1 py-2 rounded-lg text-xs font-medium border-2 border-gray-200 bg-white text-gray-500">비활성</button>
                                    <button type="button" data-status="SUSPENDED"
                                            onclick="window.setCustomerStatus('SUSPENDED')"
                                            class="customer-status-btn flex-1 py-2 rounded-lg text-xs font-medium border-2 border-gray-200 bg-white text-gray-500">정지</button>
                                </div>
                                <input type="hidden" id="customer-form-status" value="ACTIVE">
                            </div>

                            <!-- 메모 (col-12) -->
                            <div class="form-col-12">
                                <label class="form-label">
                                    메모
                                    <span id="memo-char-count" class="text-gray-400 font-normal ml-2">0 / 200</span>
                                </label>
                                <textarea id="customer-form-memo" rows="3"
                                          placeholder="특이사항, 선호도 등" maxlength="200"
                                          oninput="window.updateMemoCharCount(this.value)"
                                          class="form-control"></textarea>
                            </div>

                        </div>
                    </div>
                </div>

            </form>
        </div>

        <!-- 푸터 -->
        <div class="modal-footer">
            <button type="button" onclick="window.closeCustomerModal()" class="btn-secondary">취소</button>
            <button type="button" id="customer-save-btn" class="btn-primary">
                <i class="fas fa-save mr-1"></i>저장
            </button>
        </div>

    </div>
</div>
