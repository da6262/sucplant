<!-- 고객 등록/수정 모달 -->
<div id="customer-modal" class="modal-overlay" style="display:none;">
    <div class="modal-container">

        <!-- 헤더 -->
        <div class="modal-header">
            <span id="customer-modal-title" class="modal-title">새 고객 등록</span>
            <button id="close-customer-modal" onclick="window.closeCustomerModal()" class="modal-close-btn" title="닫기">
                <i class="fas fa-times"></i>
            </button>
        </div>

        <!-- 바디 -->
        <div class="modal-body">
            <form id="customer-form" class="space-y-4">
                <input type="hidden" id="customer-id" name="customer-id">

                <!-- 필수 정보 -->
                <div>
                    <p class="modal-section-title">필수 정보</p>
                    <div class="md:grid md:grid-cols-2 md:gap-4 space-y-4 md:space-y-0">

                        <!-- 고객명 -->
                        <div class="relative">
                            <label class="block text-sm font-medium text-gray-700 mb-1">
                                고객명 <span class="text-red-500">*</span>
                            </label>
                            <input type="text" id="customer-form-name" placeholder="홍길동" required
                                   oninput="window.handleCustomerNameInput(this.value)"
                                   onblur="window.handleCustomerNameBlur()"
                                   onfocus="window.handleCustomerNameFocus(this.value)"
                                   onkeydown="window.handleCustomerNameKeydown(event)"
                                   class="input-ui">
                            <div id="customer-name-autocomplete"
                                 class="absolute z-50 w-full bg-white border border-gray-200 rounded-lg shadow-xl mt-0.5 hidden max-h-48 overflow-y-auto"></div>
                        </div>

                        <!-- 전화번호 -->
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">
                                전화번호 <span class="text-red-500">*</span>
                            </label>
                            <input type="tel" id="customer-form-phone" placeholder="010-1234-5678" required maxlength="13"
                                   oninput="window.formatPhoneNumber(this); window.checkPhoneDuplicate(this.value)"
                                   onblur="window.checkPhoneDuplicate(this.value)"
                                   class="input-ui">
                            <div id="phone-duplicate-message" class="text-xs mt-1 hidden"></div>
                        </div>
                    </div>
                </div>

                <!-- 주소 -->
                <div class="mt-6">
                    <p class="modal-section-title">주소</p>
                    <div class="space-y-3">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">기본 주소</label>
                            <div class="flex gap-2">
                                <input type="text" id="customer-form-address"
                                       placeholder="검색 버튼을 눌러 주소를 찾아주세요" readonly
                                       class="input-ui flex-1">
                                <button type="button" id="customer-form-address-search"
                                        onclick="window.openAddressSearch()"
                                        class="btn-secondary whitespace-nowrap flex-shrink-0">
                                    <i class="fas fa-search"></i>검색
                                </button>
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">상세 주소</label>
                            <input type="text" id="customer-form-address-detail"
                                   placeholder="동, 호수 등 나머지 주소"
                                   class="input-ui">
                        </div>
                    </div>
                </div>

                <!-- 추가 정보 (접기/펼치기) -->
                <div class="mt-6">
                    <button type="button" id="toggle-extra-info" onclick="window.toggleCustomerExtraInfo()"
                            class="flex items-center gap-2 w-full text-left mb-2">
                        <p class="modal-section-title mb-0" style="margin-bottom:0;">추가 정보</p>
                        <span id="extra-info-hint" class="text-xs text-gray-400">이메일 · 등급 · 상태 · 메모</span>
                        <i id="toggle-extra-info-icon" class="fas fa-chevron-down text-gray-400 text-xs ml-auto transition-transform duration-200"></i>
                    </button>

                    <div id="extra-info-content" class="hidden space-y-4 pt-1">

                        <!-- 이메일 -->
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">이메일</label>
                            <input type="email" id="customer-form-email" placeholder="example@email.com"
                                   class="input-ui">
                        </div>

                        <!-- 등록일 + 등급 -->
                        <div class="md:grid md:grid-cols-2 md:gap-4 space-y-4 md:space-y-0">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">등록일</label>
                                <div class="flex gap-2">
                                    <input type="date" id="customer-form-registration-date" class="input-ui flex-1">
                                    <button type="button" onclick="window.setCustomerRegistrationDateToday()"
                                            class="btn-secondary flex-shrink-0">오늘</button>
                                </div>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">고객등급</label>
                                <select id="customer-form-grade" class="input-ui">
                                    <option value="GENERAL">일반</option>
                                </select>
                            </div>
                        </div>

                        <!-- 고객 상태 -->
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">고객 상태</label>
                            <div class="flex gap-2">
                                <button type="button" data-status="ACTIVE"
                                        onclick="window.setCustomerStatus('ACTIVE')"
                                        class="customer-status-btn flex-1 py-1.5 px-3 rounded-lg text-xs font-semibold border-2 transition-all border-green-500 bg-green-50 text-green-700">
                                    <i class="fas fa-check-circle mr-1"></i>활성
                                </button>
                                <button type="button" data-status="INACTIVE"
                                        onclick="window.setCustomerStatus('INACTIVE')"
                                        class="customer-status-btn flex-1 py-1.5 px-3 rounded-lg text-xs font-semibold border-2 transition-all border-gray-200 bg-white text-gray-500">
                                    <i class="fas fa-pause-circle mr-1"></i>비활성
                                </button>
                                <button type="button" data-status="SUSPENDED"
                                        onclick="window.setCustomerStatus('SUSPENDED')"
                                        class="customer-status-btn flex-1 py-1.5 px-3 rounded-lg text-xs font-semibold border-2 transition-all border-gray-200 bg-white text-gray-500">
                                    <i class="fas fa-ban mr-1"></i>정지
                                </button>
                            </div>
                            <input type="hidden" id="customer-form-status" value="ACTIVE">
                        </div>

                        <!-- 메모 -->
                        <div>
                            <div class="flex items-center justify-between mb-1">
                                <label class="block text-sm font-medium text-gray-700">메모</label>
                                <span id="memo-char-count" class="text-xs text-gray-400">0 / 200</span>
                            </div>
                            <textarea id="customer-form-memo" rows="3"
                                      placeholder="고객 특이사항, 선호도, 주의사항 등"
                                      maxlength="200"
                                      oninput="window.updateMemoCharCount(this.value)"
                                      class="input-ui resize-none"></textarea>
                        </div>

                    </div>
                </div>

            </form>
        </div>

        <!-- 푸터 -->
        <div class="modal-footer">
            <span class="text-xs text-gray-400 hidden sm:flex items-center gap-1">
                <kbd class="px-1.5 py-0.5 bg-gray-100 rounded text-gray-500 font-mono text-[10px]">Ctrl</kbd>+
                <kbd class="px-1.5 py-0.5 bg-gray-100 rounded text-gray-500 font-mono text-[10px]">Enter</kbd>
                저장
            </span>
            <div class="flex gap-2 ml-auto">
                <button type="button" onclick="window.closeCustomerModal()" class="btn-secondary">
                    <i class="fas fa-times"></i>취소
                </button>
                <button type="button" id="customer-save-btn" class="btn-primary">
                    <i class="fas fa-save"></i>저장
                </button>
            </div>
        </div>

    </div>
</div>
