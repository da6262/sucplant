<!-- 고객 등록/수정 모달 -->
<div id="customer-modal" class="fixed inset-0 bg-black/50 z-[999999] flex items-center justify-center" style="display:none;">
    <div class="bg-white rounded-xl shadow-xl w-full max-w-sm mx-4 flex flex-col max-h-[90vh]" id="customer-modal-content">

        <!-- 헤더 -->
        <div class="flex items-center justify-between px-4 py-3 border-b border-gray-100">
            <span id="customer-modal-title" class="text-sm font-semibold text-gray-800">새 고객 등록</span>
            <button onclick="window.closeCustomerModal()" class="text-gray-400 hover:text-gray-600 p-1">
                <i class="fas fa-times text-sm"></i>
            </button>
        </div>

        <!-- 폼 -->
        <div class="overflow-y-auto flex-1">
            <form id="customer-form" class="px-4 py-3 space-y-2.5">
                <input type="hidden" id="customer-id">

                <!-- 고객명 -->
                <div class="relative">
                    <label class="text-[11px] font-medium text-gray-500 mb-0.5 block">고객명 <span class="text-red-500">*</span></label>
                    <input type="text" id="customer-form-name" placeholder="홍길동" required
                           oninput="window.handleCustomerNameInput(this.value)"
                           onblur="window.handleCustomerNameBlur()"
                           onfocus="window.handleCustomerNameFocus(this.value)"
                           onkeydown="window.handleCustomerNameKeydown(event)"
                           class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-1 focus:ring-blue-500 focus:border-blue-500">
                    <div id="customer-name-autocomplete" class="absolute z-50 w-full bg-white border border-gray-200 rounded-lg shadow-lg mt-0.5 hidden max-h-40 overflow-y-auto"></div>
                </div>

                <!-- 전화번호 -->
                <div>
                    <label class="text-[11px] font-medium text-gray-500 mb-0.5 block">전화번호 <span class="text-red-500">*</span></label>
                    <input type="tel" id="customer-form-phone" placeholder="010-1234-5678" required maxlength="13"
                           oninput="window.formatPhoneNumber(this); window.checkPhoneDuplicate(this.value)"
                           onblur="window.checkPhoneDuplicate(this.value)"
                           class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-1 focus:ring-blue-500 focus:border-blue-500">
                    <div id="phone-duplicate-message" class="text-xs mt-1 hidden"></div>
                </div>

                <!-- 주소 -->
                <div>
                    <label class="text-[11px] font-medium text-gray-500 mb-0.5 block">주소</label>
                    <div class="flex gap-1.5">
                        <input type="text" id="customer-form-address" placeholder="주소 검색" readonly
                               class="flex-1 min-w-0 px-3 py-2 border border-gray-200 rounded-lg text-sm bg-gray-50 text-gray-600">
                        <button type="button" id="customer-form-address-search" onclick="window.openAddressSearch()"
                                class="px-3 py-2 bg-gray-100 hover:bg-gray-200 text-gray-600 rounded-lg text-xs font-medium whitespace-nowrap">
                            <i class="fas fa-search mr-1"></i>검색
                        </button>
                    </div>
                </div>

                <!-- 상세주소 -->
                <div>
                    <label class="text-[11px] font-medium text-gray-500 mb-0.5 block">상세주소</label>
                    <input type="text" id="customer-form-address-detail" placeholder="동, 호수 등"
                           class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-1 focus:ring-blue-500 focus:border-blue-500">
                </div>

                <!-- 추가정보 토글 -->
                <button type="button" onclick="window.toggleCustomerExtraInfo()"
                        class="w-full flex items-center justify-between py-1.5 text-xs text-gray-400 hover:text-gray-600">
                    <span>추가 정보 <span class="text-gray-300">(이메일 · 등급 · 상태 · 메모)</span></span>
                    <i id="toggle-extra-info-icon" class="fas fa-chevron-down text-xs transition-transform duration-200"></i>
                </button>

                <div id="extra-info-content" class="hidden space-y-2.5 border-t border-gray-100 pt-2.5">

                    <!-- 이메일 -->
                    <div>
                        <label class="text-[11px] font-medium text-gray-500 mb-0.5 block">이메일</label>
                        <input type="email" id="customer-form-email" placeholder="example@email.com"
                               class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-1 focus:ring-blue-500 focus:border-blue-500">
                    </div>

                    <!-- 등록일 + 등급 -->
                    <div class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="text-[11px] font-medium text-gray-500 mb-0.5 block">등록일</label>
                            <div class="flex gap-1">
                                <input type="date" id="customer-form-registration-date"
                                       class="flex-1 min-w-0 px-2 py-2 border border-gray-200 rounded-lg text-xs focus:outline-none focus:ring-1 focus:ring-blue-500">
                                <button type="button" onclick="window.setCustomerRegistrationDateToday()"
                                        class="px-2 py-2 bg-gray-100 hover:bg-gray-200 text-gray-600 rounded-lg text-xs whitespace-nowrap">오늘</button>
                            </div>
                        </div>
                        <div>
                            <label class="text-[11px] font-medium text-gray-500 mb-0.5 block">등급</label>
                            <select id="customer-form-grade"
                                    class="w-full px-2 py-2 border border-gray-200 rounded-lg text-xs focus:outline-none focus:ring-1 focus:ring-blue-500">
                                <option value="GENERAL">일반</option>
                            </select>
                        </div>
                    </div>

                    <!-- 상태 -->
                    <div>
                        <label class="text-[11px] font-medium text-gray-500 mb-0.5 block">상태</label>
                        <div class="flex gap-1.5">
                            <button type="button" data-status="ACTIVE" onclick="window.setCustomerStatus('ACTIVE')"
                                    class="customer-status-btn flex-1 py-1.5 rounded-lg text-xs font-medium border-2 border-green-500 bg-green-50 text-green-700">활성</button>
                            <button type="button" data-status="INACTIVE" onclick="window.setCustomerStatus('INACTIVE')"
                                    class="customer-status-btn flex-1 py-1.5 rounded-lg text-xs font-medium border-2 border-gray-200 bg-white text-gray-500">비활성</button>
                            <button type="button" data-status="SUSPENDED" onclick="window.setCustomerStatus('SUSPENDED')"
                                    class="customer-status-btn flex-1 py-1.5 rounded-lg text-xs font-medium border-2 border-gray-200 bg-white text-gray-500">정지</button>
                        </div>
                        <input type="hidden" id="customer-form-status" value="ACTIVE">
                    </div>

                    <!-- 메모 -->
                    <div>
                        <div class="flex justify-between mb-0.5">
                            <label class="text-[11px] font-medium text-gray-500">메모</label>
                            <span id="memo-char-count" class="text-[11px] text-gray-400">0 / 200</span>
                        </div>
                        <textarea id="customer-form-memo" rows="2" placeholder="특이사항, 선호도 등" maxlength="200"
                                  oninput="window.updateMemoCharCount(this.value)"
                                  class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm resize-none focus:outline-none focus:ring-1 focus:ring-blue-500 focus:border-blue-500"></textarea>
                    </div>

                </div>
            </form>
        </div>

        <!-- 푸터 -->
        <div class="flex justify-end gap-2 px-4 py-3 border-t border-gray-100">
            <button type="button" onclick="window.closeCustomerModal()"
                    class="px-4 py-2 text-xs font-medium text-gray-600 bg-gray-100 hover:bg-gray-200 rounded-lg">취소</button>
            <button type="button" id="customer-save-btn"
                    class="px-4 py-2 text-xs font-medium text-white bg-blue-600 hover:bg-blue-700 rounded-lg">
                <i class="fas fa-save mr-1"></i>저장
            </button>
        </div>

    </div>
</div>
