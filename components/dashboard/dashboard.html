<!-- Dashboard main -->
<div id="dashboard-section" class="section-content active app-section-frame flex flex-col" style="height:calc(100vh - 131px); overflow:hidden;">

    <div class="page-header">
        <div>
            <h2>오늘 현황</h2>
            <p class="page-subtitle">오늘 업무 흐름을 한눈에 확인합니다 <span id="last-updated"></span></p>
        </div>
        <div class="action-group">
            <span class="text-xs text-gray-500 tabular-nums" id="current-time"></span>
            <button id="refresh-realtime" class="btn-secondary">
                <i class="fas fa-sync-alt"></i>
            </button>
        </div>
    </div>

    <div class="grid grid-cols-3 gap-2 px-3 mb-2 flex-shrink-0">
        <div id="pack-waiting-card" class="app-panel border-l-4 border-orange-400 px-2 py-1.5 cursor-pointer hover:bg-orange-50 flex items-center justify-between">
            <p class="text-2xs text-gray-500 leading-tight">포장대기</p>
            <p class="text-lg font-bold text-orange-500 leading-none" id="pack-waiting-count">0</p>
        </div>
        <div id="packing-card" class="app-panel border-l-4 border-blue-400 px-2 py-1.5 cursor-pointer hover:bg-blue-50 flex items-center justify-between">
            <p class="text-2xs text-gray-500 leading-tight">포장중</p>
            <p class="text-lg font-bold text-blue-500 leading-none" id="packing-count">0</p>
        </div>
        <div id="ship-ready-card" class="app-panel border-l-4 border-purple-400 px-2 py-1.5 cursor-pointer hover:bg-purple-50 flex items-center justify-between">
            <p class="text-2xs text-gray-500 leading-tight">배송대기</p>
            <p class="text-lg font-bold text-purple-500 leading-none" id="ship-ready-count">0</p>
        </div>
        <div id="low-stock-card" class="app-panel border-l-4 border-red-400 px-2 py-1.5 cursor-pointer hover:bg-red-50 flex items-center justify-between">
            <p class="text-2xs text-gray-500 leading-tight">재고부족</p>
            <p class="text-lg font-bold text-red-500 leading-none" id="low-stock-count">0</p>
        </div>
        <div id="contact-waitlist-card" class="app-panel border-l-4 border-yellow-400 px-2 py-1.5 cursor-pointer hover:bg-yellow-50 flex items-center justify-between">
            <p class="text-2xs text-gray-500 leading-tight">연락대기</p>
            <p class="text-lg font-bold text-yellow-500 leading-none" id="contact-waitlist-count">0</p>
        </div>
        <div id="new-customers-card" class="app-panel border-l-4 border-green-400 px-2 py-1.5 cursor-pointer hover:bg-green-50 flex items-center justify-between">
            <p class="text-2xs text-gray-500 leading-tight">신규고객</p>
            <p class="text-lg font-bold text-green-500 leading-none" id="new-customers-count">0</p>
        </div>
    </div>

    <div class="flex gap-1.5 px-3 mb-2 flex-shrink-0 overflow-x-auto scrollbar-none">
        <button id="quick-new-order" class="app-btn app-btn-primary flex-shrink-0 whitespace-nowrap text-xs">
            <i class="fas fa-plus text-3xs"></i>새 주문
        </button>
        <button id="quick-packaging-labels" class="app-btn app-btn-soft flex-shrink-0 whitespace-nowrap text-xs">
            <i class="fas fa-tags text-3xs"></i>포장 라벨
        </button>
        <button id="quick-picking-list" class="app-btn app-btn-soft flex-shrink-0 whitespace-nowrap text-xs">
            <i class="fas fa-clipboard-list text-3xs"></i>피킹
        </button>
        <button id="quick-add-waitlist" class="app-btn app-btn-soft flex-shrink-0 whitespace-nowrap text-xs">
            <i class="fas fa-clock text-3xs"></i>대기자
        </button>
        <button id="quick-new-customer" class="app-btn app-btn-muted flex-shrink-0 whitespace-nowrap text-xs">
            <i class="fas fa-user-plus text-3xs"></i>새 고객
        </button>
        <button id="quick-excel-export" class="app-btn app-btn-muted flex-shrink-0 whitespace-nowrap text-xs">
            <i class="fas fa-file-excel text-3xs"></i>엑셀
        </button>
    </div>

    <div class="app-panel mx-3 mb-3 flex flex-col flex-1 overflow-hidden">
        <div class="flex items-center justify-between px-3 py-2 border-b border-gray-100 flex-shrink-0">
            <h3 class="text-xs font-semibold text-gray-700">최근 주문</h3>
            <span class="text-2xs text-gray-400">실시간</span>
        </div>
        <div id="recent-orders-list" class="overflow-y-auto flex-1 text-xs px-2 py-1 space-y-1">
            <!-- dynamic -->
        </div>
    </div>

    <div id="stock-alerts-list" class="hidden"></div>
    <div id="system-status-list" class="hidden"></div>
    <div class="hidden" style="display:none!important"><canvas id="sales-trend-chart" width="1" height="1"></canvas><canvas id="order-status-chart" width="1" height="1"></canvas></div>

</div>
