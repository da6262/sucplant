<svg width="72" height="72" viewBox="0 0 72 72" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 배경 원 -->
  <circle cx="36" cy="36" r="26" fill="url(#bg)" stroke="#ffffff" stroke-width="2"/>
  
  <!-- 다육식물 잎들 -->
  <g fill="#ffffff" stroke="#ffffff" stroke-width="2">
    <!-- 중앙 잎 -->
    <ellipse cx="36" cy="27" rx="18" ry="12" transform="rotate(0 36 27)"/>
    
    <!-- 좌측 잎 -->
    <ellipse cx="24" cy="42" rx="14.4" ry="9" transform="rotate(-45 24 42)"/>
    
    <!-- 우측 잎 -->
    <ellipse cx="48" cy="42" rx="14.4" ry="9" transform="rotate(45 48 42)"/>
  </g>
  
  <!-- 화분 -->
  <rect x="27" y="54" width="18" height="9" fill="#8b4513" rx="2"/>
</svg>