<svg width="384" height="384" viewBox="0 0 384 384" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 배경 원 -->
  <circle cx="192" cy="192" r="182" fill="url(#bg)" stroke="#ffffff" stroke-width="2"/>
  
  <!-- 다육식물 잎들 -->
  <g fill="#ffffff" stroke="#ffffff" stroke-width="2">
    <!-- 중앙 잎 -->
    <ellipse cx="192" cy="144" rx="96" ry="64" transform="rotate(0 192 144)"/>
    
    <!-- 좌측 잎 -->
    <ellipse cx="128" cy="224" rx="76.8" ry="48" transform="rotate(-45 128 224)"/>
    
    <!-- 우측 잎 -->
    <ellipse cx="256" cy="224" rx="76.8" ry="48" transform="rotate(45 256 224)"/>
  </g>
  
  <!-- 화분 -->
  <rect x="144" y="288" width="96" height="48" fill="#8b4513" rx="2"/>
