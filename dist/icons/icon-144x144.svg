<svg width="144" height="144" viewBox="0 0 144 144" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 배경 원 -->
  <circle cx="72" cy="72" r="62" fill="url(#bg)" stroke="#ffffff" stroke-width="2"/>
  
  <!-- 다육식물 잎들 -->
  <g fill="#ffffff" stroke="#ffffff" stroke-width="2">
    <!-- 중앙 잎 -->
    <ellipse cx="72" cy="54" rx="36" ry="24" transform="rotate(0 72 54)"/>
    
    <!-- 좌측 잎 -->
    <ellipse cx="48" cy="84" rx="28.8" ry="18" transform="rotate(-45 48 84)"/>
    
    <!-- 우측 잎 -->
    <ellipse cx="96" cy="84" rx="28.8" ry="18" transform="rotate(45 96 84)"/>
  </g>
  
  <!-- 화분 -->
  <rect x="54" y="108" width="36" height="18" fill="#8b4513" rx="2"/>
</svg>