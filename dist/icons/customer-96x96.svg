<svg width="96" height="96" viewBox="0 0 96 96" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 배경 원 -->
  <circle cx="48" cy="48" r="38" fill="url(#bg)" stroke="#ffffff" stroke-width="2"/>
  
  <!-- 다육식물 잎들 -->
  <g fill="#ffffff" stroke="#ffffff" stroke-width="2">
    <!-- 중앙 잎 -->
    <ellipse cx="48" cy="36" rx="24" ry="16" transform="rotate(0 48 36)"/>
    
    <!-- 좌측 잎 -->
    <ellipse cx="32" cy="56" rx="19.2" ry="12" transform="rotate(-45 32 56)"/>
    
    <!-- 우측 잎 -->
    <ellipse cx="64" cy="56" rx="19.2" ry="12" transform="rotate(45 64 56)"/>
  </g>
  
  <!-- 화분 -->
  <rect x="36" y="72" width="24" height="12" fill="#8b4513" rx="2"/>
</svg>