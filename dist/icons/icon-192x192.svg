<svg width="192" height="192" viewBox="0 0 192 192" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 배경 원 -->
  <circle cx="96" cy="96" r="86" fill="url(#bg)" stroke="#ffffff" stroke-width="2"/>
  
  <!-- 다육식물 잎들 -->
  <g fill="#ffffff" stroke="#ffffff" stroke-width="2">
    <!-- 중앙 잎 -->
    <ellipse cx="96" cy="72" rx="48" ry="32" transform="rotate(0 96 72)"/>
    
    <!-- 좌측 잎 -->
    <ellipse cx="64" cy="112" rx="38.4" ry="24" transform="rotate(-45 64 112)"/>
    
    <!-- 우측 잎 -->
    <ellipse cx="128" cy="112" rx="38.4" ry="24" transform="rotate(45 128 112)"/>
  </g>
  
  <!-- 화분 -->
  <rect x="72" y="144" width="48" height="24" fill="#8b4513" rx="2"/>
</svg>