<!-- 대시보드: 한 화면 완전 표시 (스크롤 없음) -->
<div id="dashboard-section" class="section-content active bg-gray-50 flex flex-col" style="height:calc(100vh - 131px); overflow:hidden;">

    <!-- 헤더 (1줄) -->
    <div class="flex items-center justify-between px-1 py-1.5 flex-shrink-0">
        <div>
            <span class="text-sm font-bold text-gray-900">오늘 현황</span>
            <span class="text-[10px] text-gray-400 ml-2" id="last-updated"></span>
        </div>
        <div class="flex items-center gap-2">
            <span class="text-xs text-gray-500 tabular-nums" id="current-time"></span>
            <button id="refresh-realtime" class="w-6 h-6 bg-emerald-600 hover:bg-emerald-700 text-white rounded-md flex items-center justify-center">
                <i class="fas fa-sync-alt text-[10px]"></i>
            </button>
        </div>
    </div>

    <!-- 현황 카드 3x2 (초압축) -->
    <div class="grid grid-cols-3 gap-1.5 px-1 mb-1.5 flex-shrink-0">
        <div id="pack-waiting-card" class="bg-white border-l-4 border-orange-400 rounded-lg px-2 py-1.5 cursor-pointer hover:bg-orange-50 flex items-center justify-between">
            <p class="text-[10px] text-gray-500 leading-tight">포장대기</p>
            <p class="text-lg font-bold text-orange-500 leading-none" id="pack-waiting-count">0</p>
        </div>
        <div id="packing-card" class="bg-white border-l-4 border-blue-400 rounded-lg px-2 py-1.5 cursor-pointer hover:bg-blue-50 flex items-center justify-between">
            <p class="text-[10px] text-gray-500 leading-tight">포장중</p>
            <p class="text-lg font-bold text-blue-500 leading-none" id="packing-count">0</p>
        </div>
        <div id="ship-ready-card" class="bg-white border-l-4 border-purple-400 rounded-lg px-2 py-1.5 cursor-pointer hover:bg-purple-50 flex items-center justify-between">
            <p class="text-[10px] text-gray-500 leading-tight">배송대기</p>
            <p class="text-lg font-bold text-purple-500 leading-none" id="ship-ready-count">0</p>
        </div>
        <div id="low-stock-card" class="bg-white border-l-4 border-red-400 rounded-lg px-2 py-1.5 cursor-pointer hover:bg-red-50 flex items-center justify-between">
            <p class="text-[10px] text-gray-500 leading-tight">재고부족</p>
            <p class="text-lg font-bold text-red-500 leading-none" id="low-stock-count">0</p>
        </div>
        <div id="contact-waitlist-card" class="bg-white border-l-4 border-yellow-400 rounded-lg px-2 py-1.5 cursor-pointer hover:bg-yellow-50 flex items-center justify-between">
            <p class="text-[10px] text-gray-500 leading-tight">연락대기</p>
            <p class="text-lg font-bold text-yellow-500 leading-none" id="contact-waitlist-count">0</p>
        </div>
        <div id="new-customers-card" class="bg-white border-l-4 border-green-400 rounded-lg px-2 py-1.5 cursor-pointer hover:bg-green-50 flex items-center justify-between">
            <p class="text-[10px] text-gray-500 leading-tight">신규고객</p>
            <p class="text-lg font-bold text-green-500 leading-none" id="new-customers-count">0</p>
        </div>
    </div>

    <!-- 빠른 업무: 아이콘+텍스트 한 줄 -->
    <div class="flex gap-1.5 px-1 mb-1.5 flex-shrink-0 overflow-x-auto scrollbar-none">
        <button id="quick-new-order" class="flex-shrink-0 flex items-center gap-1 px-2.5 py-1.5 bg-green-600 hover:bg-green-700 text-white rounded-lg text-[11px] font-semibold whitespace-nowrap">
            <i class="fas fa-plus text-[9px]"></i>새 주문
        </button>
        <button id="quick-packaging-labels" class="flex-shrink-0 flex items-center gap-1 px-2.5 py-1.5 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg text-[11px] font-semibold whitespace-nowrap">
            <i class="fas fa-tags text-[9px]"></i>포장라벨
        </button>
        <button id="quick-picking-list" class="flex-shrink-0 flex items-center gap-1 px-2.5 py-1.5 bg-purple-600 hover:bg-purple-700 text-white rounded-lg text-[11px] font-semibold whitespace-nowrap">
            <i class="fas fa-clipboard-list text-[9px]"></i>피킹
        </button>
        <button id="quick-add-waitlist" class="flex-shrink-0 flex items-center gap-1 px-2.5 py-1.5 bg-yellow-500 hover:bg-yellow-600 text-white rounded-lg text-[11px] font-semibold whitespace-nowrap">
            <i class="fas fa-clock text-[9px]"></i>대기자
        </button>
        <button id="quick-new-customer" class="flex-shrink-0 flex items-center gap-1 px-2.5 py-1.5 bg-gray-500 hover:bg-gray-600 text-white rounded-lg text-[11px] font-semibold whitespace-nowrap">
            <i class="fas fa-user-plus text-[9px]"></i>새고객
        </button>
        <button id="quick-excel-export" class="flex-shrink-0 flex items-center gap-1 px-2.5 py-1.5 bg-emerald-600 hover:bg-emerald-700 text-white rounded-lg text-[11px] font-semibold whitespace-nowrap">
            <i class="fas fa-file-excel text-[9px]"></i>엑셀
        </button>
    </div>

    <!-- 최근 주문 (남은 공간 모두 사용) -->
    <div class="bg-white rounded-xl border border-gray-200 mx-1 flex flex-col flex-1 overflow-hidden">
        <div class="flex items-center justify-between px-3 py-2 border-b border-gray-100 flex-shrink-0">
            <h3 class="text-xs font-semibold text-gray-700">최근 주문</h3>
            <span class="text-[10px] text-gray-400">실시간</span>
        </div>
        <div id="recent-orders-list" class="overflow-y-auto flex-1 text-xs px-2 py-1 space-y-1">
            <!-- 동적 -->
        </div>
    </div>

    <!-- JS 호환용 숨김 요소 -->
    <div id="stock-alerts-list" class="hidden"></div>
    <div id="system-status-list" class="hidden"></div>
    <div class="hidden" style="display:none!important"><canvas id="sales-trend-chart" width="1" height="1"></canvas><canvas id="order-status-chart" width="1" height="1"></canvas></div>

</div>
