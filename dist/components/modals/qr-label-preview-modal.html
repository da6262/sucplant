<!-- QR 라벨 미리보기 모달 -->
<div id="qr-label-preview-modal" class="modal-overlay hidden">
    <div class="modal-container modal-xl">

        <!-- 헤더 -->
        <div class="modal-header">
            <span class="modal-title">
                <i class="fas fa-qrcode mr-2 text-orange-600"></i>QR 라벨 미리보기
            </span>
            <div class="flex items-center gap-4 text-sm text-orange-700">
                <span>크기: 1.3cm × 4cm</span>
                <span>용지: A4</span>
                <span id="total-labels">총 0개 라벨</span>
            </div>
            <button id="close-qr-label-preview-modal" class="modal-close-btn">
                <i class="fas fa-times"></i>
            </button>
        </div>

        <!-- A4 미리보기 영역 -->
        <div class="modal-body" style="background:#f3f4f6;">
            <div id="qr-labels-container" class="bg-white mx-auto" style="width: 210mm; min-height: 297mm; padding: 10mm;">
                <!-- QR 라벨들이 여기에 동적으로 생성됩니다 -->
            </div>
        </div>

        <!-- 푸터 -->
        <div class="modal-footer">
            <button id="close-qr-label-modal-btn" class="btn-secondary">닫기</button>
            <button id="print-qr-labels" class="btn-primary">
                <i class="fas fa-print mr-1"></i>인쇄하기
            </button>
        </div>

    </div>
</div>
