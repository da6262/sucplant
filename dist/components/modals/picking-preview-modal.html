<!-- 상품별 피킹 미리보기 모달 -->
<div id="picking-preview-modal" class="modal-overlay hidden">
    <div class="modal-container modal-xl">

        <!-- 헤더 -->
        <div class="modal-header">
            <span class="modal-title">
                <i class="fas fa-clipboard-list mr-2 text-body"></i>피킹 리스트 미리보기
            </span>
            <button id="close-picking-preview-modal" class="modal-close-btn">
                <i class="fas fa-times"></i>
            </button>
        </div>

        <!-- 본문 -->
        <div class="modal-body">
            <div class="text-sm text-body mb-3">
                <i class="fas fa-info-circle mr-1"></i>
                미리보기 화면입니다. 출력 버튼을 클릭하여 실제 인쇄하세요.
            </div>
            <div id="picking-preview-content" class="p-4 border border-gray-200 rounded-lg bg-section min-h-96 overflow-auto">
                <!-- 미리보기 내용이 여기에 표시됩니다 -->
            </div>
        </div>

        <!-- 푸터 -->
        <div class="modal-footer">
            <button id="close-picking-preview-modal-btn" class="btn-secondary">닫기</button>
            <button id="print-picking-preview" class="btn-primary">
                <i class="fas fa-print mr-1"></i>피킹 리스트 출력
            </button>
        </div>

    </div>
</div>
