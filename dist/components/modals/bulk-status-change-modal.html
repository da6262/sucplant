<!-- 일괄 상태변경 모달 -->
<div id="bulk-status-change-modal" class="modal-overlay hidden">
    <div class="modal-container modal-sm">

        <!-- 헤더 -->
        <div class="modal-header">
            <span class="modal-title">
                <i class="fas fa-edit mr-2 text-brand"></i>일괄 상태변경
            </span>
            <button id="close-bulk-status-modal" class="modal-close-btn">
                <i class="fas fa-times"></i>
            </button>
        </div>

        <!-- 본문 -->
        <div class="modal-body">
            <div class="mb-4">
                <p class="text-sm text-body mb-2">
                    선택된 <span id="selected-orders-count" class="font-bold text-brand">0</span>개 주문의 상태를 변경합니다.
                </p>
            </div>

            <div>
                <label class="block text-sm font-medium text-body mb-2">변경할 상태 선택</label>
                <select id="bulk-status-select" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-transparent">
                    <option value="">상태를 선택하세요</option>
                    <option value="주문접수">📝 주문접수</option>
                    <option value="입금확인">💰 입금확인</option>
                    <option value="배송준비">📦 배송준비</option>
                    <option value="배송시작">🚚 배송시작</option>
                    <option value="배송완료">✅ 배송완료</option>
                    <option value="주문취소">❌ 주문취소</option>
                    <option value="환불처리">🔄 환불처리</option>
                </select>
            </div>
        </div>

        <!-- 푸터 -->
        <div class="modal-footer">
            <button id="cancel-bulk-status" class="btn-secondary">취소</button>
            <button id="confirm-bulk-status" class="btn-primary">
                <i class="fas fa-check mr-1"></i>변경 확인
            </button>
        </div>

    </div>
</div>
