<!-- 주문 상세 내역 모달 -->
<div id="order-detail-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden z-50">
    <div class="flex items-center justify-center min-h-screen p-4">
        <div class="bg-white rounded-lg max-w-4xl w-full max-h-screen overflow-auto">
            <div class="p-6">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-xl font-bold text-gray-800">
                        <i class="fas fa-receipt mr-2 text-blue-600"></i>주문 상세 내역
                    </h3>
                    <button id="close-order-detail-modal" class="text-gray-400 hover:text-gray-600">
                        <i class="fas fa-times text-xl"></i>
                    </button>
                </div>
                
                <!-- 주문 기본 정보 -->
                <div class="mb-6 p-4 bg-blue-50 rounded-lg">
                    <h4 class="font-semibold text-blue-800 mb-3">주문 정보</h4>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-sm">
                        <div>
                            <span class="font-medium text-gray-700">주문번호:</span>
                            <span id="detail-order-number" class="ml-2 text-gray-900">-</span>
                        </div>
                        <div>
                            <span class="font-medium text-gray-700">주문일자:</span>
                            <span id="detail-order-date" class="ml-2 text-gray-900">-</span>
                        </div>
                        <div>
                            <span class="font-medium text-gray-700">주문상태:</span>
                            <span id="detail-order-status" class="ml-2 px-2 py-1 rounded-full text-xs font-semibold">-</span>
                        </div>
                        <div>
                            <span class="font-medium text-gray-700">주문채널:</span>
                            <span id="detail-order-channel" class="ml-2 text-gray-900">-</span>
                        </div>
                    </div>
                </div>
                
                <!-- 고객 정보 -->
                <div class="mb-6 p-4 bg-green-50 rounded-lg">
                    <h4 class="font-semibold text-green-800 mb-3">고객 정보</h4>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-sm">
                        <div>
                            <span class="font-medium text-gray-700">고객명:</span>
                            <span id="detail-customer-name" class="ml-2 text-gray-900">-</span>
                        </div>
                        <div>
                            <span class="font-medium text-gray-700">연락처:</span>
                            <span id="detail-customer-phone" class="ml-2 text-gray-900">-</span>
                        </div>
                        <div class="md:col-span-2">
                            <span class="font-medium text-gray-700">배송지:</span>
                            <span id="detail-customer-address" class="ml-2 text-gray-900">-</span>
                        </div>
                    </div>
                </div>
                
                <!-- 주문 상품 목록 -->
                <div class="mb-6">
                    <h4 class="font-semibold text-gray-800 mb-3">주문 상품</h4>
                    <div class="overflow-x-auto">
                        <table class="min-w-full divide-y divide-gray-200">
                            <thead class="bg-gray-50">
                                <tr>
                                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">상품명</th>
                                    <th class="px-4 py-3 text-center text-xs font-medium text-gray-500 uppercase tracking-wider">수량</th>
                                    <th class="px-4 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">단가</th>
                                    <th class="px-4 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">금액</th>
                                </tr>
                            </thead>
                            <tbody id="detail-order-items" class="bg-white divide-y divide-gray-200">
                                <!-- 주문 상품들이 여기에 표시됩니다 -->
                            </tbody>
                        </table>
                    </div>
                </div>
                
                <!-- 주문 금액 요약 -->
                <div class="mb-6 p-4 bg-gray-50 rounded-lg">
                    <h4 class="font-semibold text-gray-800 mb-3">금액 요약</h4>
                    <div class="space-y-2 text-sm">
                        <div class="flex justify-between">
                            <span class="text-gray-600">상품금액:</span>
                            <span id="detail-product-amount" class="font-medium">0원</span>
                        </div>
                        <div class="flex justify-between">
                            <span class="text-gray-600">배송비:</span>
                            <span id="detail-shipping-fee" class="font-medium">0원</span>
                        </div>
                        <div class="flex justify-between">
                            <span class="text-gray-600">할인금액:</span>
                            <span id="detail-discount-amount" class="font-medium text-red-600">-0원</span>
                        </div>
                        <hr class="my-2">
                        <div class="flex justify-between text-lg font-bold">
                            <span>총 결제금액:</span>
                            <span id="detail-total-amount" class="text-blue-600">0원</span>
                        </div>
                    </div>
                </div>
                
                <!-- 배송 정보 -->
                <div class="mb-6 p-4 bg-purple-50 rounded-lg">
                    <h4 class="font-semibold text-purple-800 mb-3">배송 정보</h4>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-sm">
                        <div>
                            <span class="font-medium text-gray-700">송장번호:</span>
                            <span id="detail-tracking-number" class="ml-2 text-gray-900">-</span>
                        </div>
                        <div>
                            <span class="font-medium text-gray-700">배송상태:</span>
                            <span id="detail-shipping-status" class="ml-2 text-gray-900">-</span>
                        </div>
                    </div>
                </div>
                
                <!-- 메모 -->
                <div class="mb-6 p-4 bg-yellow-50 rounded-lg">
                    <h4 class="font-semibold text-yellow-800 mb-3">주문 메모</h4>
                    <p id="detail-order-memo" class="text-sm text-gray-700">-</p>
                </div>
                
                <!-- 액션 버튼들 -->
                <div class="flex justify-end space-x-3">
                    <button id="edit-order-btn" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg transition-colors">
                        <i class="fas fa-edit mr-2"></i>주문 수정
                    </button>
                    <button id="print-order-btn" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg transition-colors">
                        <i class="fas fa-print mr-2"></i>주문서 출력
                    </button>
                    <button id="close-order-detail-modal-btn" class="bg-gray-500 hover:bg-gray-600 text-white px-4 py-2 rounded-lg transition-colors">
                        닫기
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
