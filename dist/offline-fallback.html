<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오프라인 - 경산다육식물농장</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">
    <div class="max-w-md mx-auto text-center px-6">
        <!-- 오프라인 아이콘 -->
        <div class="w-24 h-24 bg-yellow-100 rounded-full flex items-center justify-center mx-auto mb-6">
            <i class="fas fa-wifi-slash text-yellow-600 text-3xl"></i>
        </div>
        
        <!-- 메시지 -->
        <h1 class="text-2xl font-bold text-gray-800 mb-4">오프라인 상태</h1>
        <p class="text-gray-600 mb-6">
            인터넷 연결을 확인해주세요.<br>
            일부 기능은 오프라인에서도 사용할 수 있습니다.
        </p>
        
        <!-- 상태 정보 -->
        <div class="bg-white rounded-lg shadow-md p-4 mb-6">
            <div class="flex items-center justify-between mb-2">
                <span class="text-sm text-gray-600">연결 상태</span>
                <span class="text-sm text-red-600 font-medium">
                    <i class="fas fa-circle text-red-500 mr-1"></i>
                    오프라인
                </span>
            </div>
            <div class="flex items-center justify-between mb-2">
                <span class="text-sm text-gray-600">캐시 상태</span>
                <span class="text-sm text-green-600 font-medium">
                    <i class="fas fa-circle text-green-500 mr-1"></i>
                    활성
                </span>
            </div>
            <div class="flex items-center justify-between">
                <span class="text-sm text-gray-600">버전</span>
                <span class="text-sm text-gray-800 font-medium">v5.0.0</span>
            </div>
        </div>
        
        <!-- 액션 버튼들 -->
        <div class="space-y-3">
            <button onclick="location.reload()" 
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 px-4 rounded-lg transition-colors">
                <i class="fas fa-sync-alt mr-2"></i>
                다시 시도
            </button>
            
            <button onclick="goHome()" 
                    class="w-full bg-gray-600 hover:bg-gray-700 text-white py-3 px-4 rounded-lg transition-colors">
                <i class="fas fa-home mr-2"></i>
                홈으로 이동
            </button>
            
            <button onclick="checkConnection()" 
                    class="w-full bg-green-600 hover:bg-green-700 text-white py-3 px-4 rounded-lg transition-colors">
                <i class="fas fa-wifi mr-2"></i>
                연결 확인
            </button>
        </div>
        
        <!-- 오프라인 기능 안내 -->
        <div class="mt-8 text-left">
            <h3 class="text-lg font-semibold text-gray-800 mb-3">오프라인에서 사용 가능한 기능</h3>
            <ul class="space-y-2 text-sm text-gray-600">
                <li class="flex items-center">
                    <i class="fas fa-check text-green-500 mr-2"></i>
                    저장된 고객 정보 조회
                </li>
                <li class="flex items-center">
                    <i class="fas fa-check text-green-500 mr-2"></i>
                    저장된 상품 정보 조회
                </li>
                <li class="flex items-center">
                    <i class="fas fa-check text-green-500 mr-2"></i>
                    주문 정보 입력 (연결 시 자동 동기화)
                </li>
                <li class="flex items-center">
                    <i class="fas fa-check text-green-500 mr-2"></i>
                    대기자 목록 조회
                </li>
            </ul>
        </div>
        
        <!-- 푸터 -->
        <div class="mt-8 pt-4 border-t border-gray-200">
            <p class="text-xs text-gray-500">
                경산다육식물농장 관리시스템 v5.0<br>
                오프라인 모드 지원
            </p>
        </div>
    </div>
    
    <script>
        // 홈으로 이동
        function goHome() {
            window.location.href = '/';
        }
        
        // 연결 상태 확인
        function checkConnection() {
            if (navigator.onLine) {
                location.reload();
            } else {
                alert('아직 인터넷 연결이 없습니다. 잠시 후 다시 시도해주세요.');
            }
        }
        
        // 온라인 상태 감지
        window.addEventListener('online', function() {
            console.log('🌐 온라인 상태 감지');
            setTimeout(() => {
                location.reload();
            }, 1000);
        });
        
        // 오프라인 상태 감지
        window.addEventListener('offline', function() {
            console.log('📴 오프라인 상태 감지');
        });
        
        // 페이지 로드 시 연결 상태 확인
        document.addEventListener('DOMContentLoaded', function() {
            console.log('📱 오프라인 페이지 로드');
            
            if (navigator.onLine) {
                // 온라인이면 메인 페이지로 리다이렉트
                setTimeout(() => {
                    goHome();
                }, 2000);
            }
        });
    </script>
</body>
</html>
